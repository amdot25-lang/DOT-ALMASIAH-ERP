function v16AllMonths(){ return [...new Set(allBroadcasterCalcRowsV11().map(r=>r.month).filter(Boolean))].sort().reverse(); }
function v16AllYears(){ return [...new Set(v16AllMonths().map(m=>String(m).slice(0,4)).filter(Boolean))].sort().reverse(); }
function v16PrevMonth(m){
  const months=v16AllMonths().slice().sort();
  const i=months.indexOf(m);
  return i>0 ? months[i-1] : '';
}
function v16PrevYear(y){ return String((Number(y)||0)-1); }
function v16PulseState(){
  const months=v16AllMonths(), years=v16AllYears();
  if(!app.pulseScope) app.pulseScope = app.period?.mode==='yearly' ? 'year' : 'month';
  if(!['month','year','history'].includes(app.pulseScope)) app.pulseScope='month';
  if(!app.pulseMonth || !months.includes(app.pulseMonth)) app.pulseMonth = (app.period?.mode==='monthly' && app.period.from ? String(app.period.from).slice(0,7) : (months[0]||currentMonth()));
  if(!app.pulseYear || !years.includes(app.pulseYear)) app.pulseYear = (app.period?.mode==='yearly' && app.period.from ? String(app.period.from).slice(0,4) : (years[0]||String(new Date().getFullYear())));
  const label = app.pulseScope==='history' ? 'تاريخي كامل' : (app.pulseScope==='year' ? `سنة ${app.pulseYear}` : `شهر ${app.pulseMonth}`);
  return {scope:app.pulseScope, month:app.pulseMonth, year:app.pulseYear, months, years, label};
}
function v16RowsForScope(scope, month, year){
  const rows=allBroadcasterCalcRowsV11();
  if(scope==='month') return rows.filter(r=>r.month===month);
  if(scope==='year') return rows.filter(r=>String(r.month||'').slice(0,4)===String(year));
  return rows;
}
function v16RankForScope(scope, month, year){ return buildBroadcasterRankingV11(v16RowsForScope(scope,month,year)); }
function v16MapRank(rows){ const m={}; rows.forEach(r=>m[r.key]=r); return m; }
function v16ScopeTotals(rows){
  return {records:rows.length, active:0,
    salarySAR:rows.reduce((a,r)=>a+r.salarySAR,0), commissionSAR:rows.reduce((a,r)=>a+r.commissionSAR,0), totalSAR:rows.reduce((a,r)=>a+r.totalSAR,0),
    salaryUSD:rows.reduce((a,r)=>a+r.salaryUSD,0), commissionUSD:rows.reduce((a,r)=>a+r.commissionUSD,0), totalUSD:rows.reduce((a,r)=>a+r.totalUSD,0)};
}
function v16GrowthInfo(scope, month, year){
  if(scope==='month'){
    const prev=v16PrevMonth(month);
    if(!prev) return {label:'لا توجد مقارنة سابقة', value:'—', detail:'أول شهر متاح في البيانات', cls:'warn'};
    const cur=v16MapRank(v16RankForScope('month',month,year));
    const old=v16MapRank(v16RankForScope('month',prev,year));
    const candidates=Object.keys(cur).map(k=>{ const c=cur[k], p=old[k]; if(!p || p.salarySAR<=0 || c.salarySAR<=0) return null; const diff=c.salarySAR-p.salarySAR; return {...c, prev:p.salarySAR, diff, ratio:diff/p.salarySAR}; }).filter(Boolean).filter(x=>x.diff>0).sort((a,b)=>b.diff-a.diff);
    const r=candidates[0];
    return r ? {label:'أكثر مذيع صاعد', value:r.name, detail:`+${sar(r.diff)} ر.س عن ${prev}`, cls:'good'} : {label:'أكثر مذيع صاعد', value:'—', detail:`لا يوجد ارتفاع واضح مقارنة بـ ${prev}`, cls:'warn'};
  }
  if(scope==='year'){
    const prev=v16PrevYear(year);
    const cur=v16MapRank(v16RankForScope('year',month,year));
    const old=v16MapRank(v16RankForScope('year',month,prev));
    const candidates=Object.keys(cur).map(k=>{ const c=cur[k], p=old[k]; if(!p || p.salarySAR<=0 || c.salarySAR<=0) return null; const diff=c.salarySAR-p.salarySAR; return {...c, prev:p.salarySAR, diff, ratio:diff/p.salarySAR}; }).filter(Boolean).filter(x=>x.diff>0).sort((a,b)=>b.diff-a.diff);
    const r=candidates[0];
    return r ? {label:'أعلى نمو سنوي', value:r.name, detail:`+${sar(r.diff)} ر.س عن ${prev}`, cls:'good'} : {label:'أعلى نمو سنوي', value:'—', detail:`لا يوجد ارتفاع واضح مقارنة بسنة ${prev}`, cls:'warn'};
  }
  return {label:'أفضل مذيع تاريخيًا', value:'حسب الترتيب العام', detail:'استخدم الشهر أو السنة لقراءة الصعود والهبوط بدقة', cls:'gold'};
}
function v16MonthlyAverageBefore(key, month, maxCount=3){
  const hist=getBroadcasterMonthlyMapV14(key).filter(x=>x.month<month && x.salarySAR>0).slice(-maxCount);
  if(!hist.length) return 0;
  return hist.reduce((a,x)=>a+x.salarySAR,0)/hist.length;
}
function v16FollowUp(scope, month, year, limit=6){
  const allRank=buildBroadcasterRankingV11(allBroadcasterCalcRowsV11()).sort((a,b)=>b.salarySAR-a.salarySAR);
  const results=[];
  if(scope==='month'){
    const curMap=v16MapRank(v16RankForScope('month',month,year));
    const prev=v16PrevMonth(month);
    const prevMap=prev ? v16MapRank(v16RankForScope('month',prev,year)) : {};
    allRank.slice(0,80).forEach(r=>{
      const cur=curMap[r.key]?.salarySAR || 0;
      const avg=v16MonthlyAverageBefore(r.key,month,3);
      const prevVal=prevMap[r.key]?.salarySAR || 0;
      const p=profileForKey(r.key);
      const reasons=[];
      let score=0;
      if(avg>=1000 && cur < avg*0.45){ reasons.push('أقل من متوسط آخر أشهره'); score += avg-cur; }
      if(prevVal>=1000 && cur===0){ reasons.push('نشط في الشهر السابق ومتوقف الآن'); score += prevVal; }
      if((p.tags||[]).some(t=>/متابعة|متوقف|منخفض/i.test(t))){ reasons.push('وسم إداري'); score += 500; }
      if(reasons.length) results.push({...r, cur, avg, prevVal, reasons:[...new Set(reasons)], score});
    });
  } else if(scope==='year'){
    const curMap=v16MapRank(v16RankForScope('year',month,year));
    const prevMap=v16MapRank(v16RankForScope('year',month,v16PrevYear(year)));
    allRank.slice(0,80).forEach(r=>{
      const cur=curMap[r.key]?.salarySAR || 0, prev=prevMap[r.key]?.salarySAR || 0;
      const p=profileForKey(r.key); const reasons=[]; let score=0;
      if(prev>=5000 && cur < prev*.5){ reasons.push('هبوط واضح عن السنة السابقة'); score += prev-cur; }
      if((p.tags||[]).some(t=>/متابعة|متوقف|منخفض/i.test(t))){ reasons.push('وسم إداري'); score += 500; }
      if(reasons.length) results.push({...r, cur, prevVal:prev, avg:prev, reasons:[...new Set(reasons)], score});
    });
  } else {
    allRank.slice(0,120).forEach(r=>{
      const p=profileForKey(r.key); const reasons=[]; let score=0;
      if((p.tags||[]).some(t=>/متابعة|متوقف|منخفض/i.test(t))){ reasons.push('وسم إداري'); score += 500; }
      const last = r.latestMonth || '';
      const months=v16AllMonths().slice().sort();
      const lastIdx=months.indexOf(last);
      if(lastIdx>=0 && months.length-lastIdx>6 && r.salarySAR>20000){ reasons.push('مذيع مهم غير نشط حديثًا'); score += r.salarySAR/100; }
      if(reasons.length) results.push({...r, cur:0, avg:0, reasons:[...new Set(reasons)], score});
    });
  }
  return results.sort((a,b)=>b.score-a.score).slice(0,limit);
}
function v16TargetLine(scope, month){
  if(scope!=='month') return {cls:'warn', text:'هدف الألماس الشهري يظهر بدقة عند اختيار نطاق شهر محدد.'};
  const t=monthDiamondTargetReportV14(month);
  if(t.progress>=1) return {cls:'good', text:`هدف الألماس متحقق بنسبة ${pct(t.progress)}، والتجاوز ${ar(Math.max(t.sold-t.target,0))} ماسة.`};
  if(t.pace>=0) return {cls:'good', text:`الألماس متقدم عن المسار اليومي، والمتبقي ${ar(t.remaining)} ماسة.`};
  return {cls:'warn', text:`الألماس أقل من المسار اليومي، المطلوب تقريبًا ${ar(t.dailyNeed)} ماسة/يوم.`};
}

function currentStockV18(){ const rows=getStoreSeries(); return rows.length?num(rows[rows.length-1].remainingQty):num(loadSettings().openingDiamonds||0); }
function reportMonthLabelV18(month){
  const m=String(month||'');
  if(!/^\d{4}-\d{2}$/.test(m)) return m||'—';
  const [y,mo]=m.split('-').map(Number);
  try{return new Intl.DateTimeFormat('ar-SA-u-ca-gregory',{month:'long',year:'numeric'}).format(new Date(y,mo-1,1));}catch(e){return m;}
}
function reportDateLabelV18(dateStr){
  if(!dateStr) return '—';
  const d=new Date(String(dateStr).slice(0,10)+'T12:00:00');
  if(isNaN(d)) return String(dateStr);
  try{return new Intl.DateTimeFormat('ar-SA-u-ca-gregory',{day:'numeric',month:'long',year:'numeric'}).format(d);}catch(e){return String(dateStr);}
}
function reportPreviousMonthV18(month){
  const [y,m]=String(month).split('-').map(Number);
  const d=new Date(y,m-2,1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function reportDaysInMonthV18(month){
  const [y,m]=String(month).split('-').map(Number);
  return new Date(y,m,0).getDate();
}
function reportStoreSummaryV18(rows){
  const sales=rows.reduce((a,e)=>a+num(e.salesInc||e.salesIncl),0);
  const sold=rows.reduce((a,e)=>a+num(e.diamondsSold),0);
  const purchased=rows.reduce((a,e)=>a+num(e.diamondsPurchased),0);
  const purchases=rows.reduce((a,e)=>a+num(e.purchasesInc||e.purchasesIncl),0);
  const cogs=rows.reduce((a,e)=>a+num(e.cogs),0);
  const expenses=rows.reduce((a,e)=>a+storeExpenses(e),0);
  const net=rows.reduce((a,e)=>a+num(e.netProfit),0);
  const vatDue=rows.reduce((a,e)=>a+num(e.vatDue),0);
  return {sales,sold,purchased,purchases,cogs,expenses,net,vatDue,margin:sales?net/sales:0,rows:rows.length};
}
function reportDeltaV18(cur,prev,type){
  if(!num(prev)) return {text:'—',cls:'neutral'};
  if(type==='points'){
    const d=(num(cur)-num(prev))*100;
    return {text:`${d>=0?'+':''}${d.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})} نقطة`,cls:d>=0?'up':'down'};
  }
  const d=(num(cur)-num(prev))/Math.abs(num(prev))*100;
  return {text:`${d>=0?'+':''}${d.toLocaleString('en-US',{maximumFractionDigits:1})}%`,cls:d>=0?'up':'down'};
}
function reportEscAttrV18(v){return escV11(String(v||'')).replace(/"/g,'&quot;');}

<style id="v21-styles">
/* v21 — purchase cards, broadcaster display names, quarterly VAT */
.v19-primary-cards{grid-template-columns:repeat(4,minmax(205px,1fr));}
.v21-purchase-card::before{background:#8f7441!important;opacity:.72!important}

.v21-tax-card{border:1px solid var(--border);background:linear-gradient(180deg,#171719,#111113);border-radius:14px;padding:16px;position:relative;overflow:hidden;min-height:122px}
.v21-tax-card::before{content:"";position:absolute;right:0;top:0;width:3px;height:100%;background:#74684e}
.v21-tax-card.gold::before{background:var(--gold-bright)}

.v21-tax-card .label{font-size:10px;color:var(--text-dim)}
.v21-tax-card .value{font-family:var(--font-display);font-size:24px;font-weight:700;margin-top:7px;direction:ltr;text-align:right;font-variant-numeric:tabular-nums}
.v21-tax-card .foot{font-size:9.5px;color:var(--text-faint);margin-top:6px}
.v21-tax-years{display:grid;gap:14px}

.v21-year-tax-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.v21-year-tax-head h3{font-family:var(--font-display);font-size:18px;color:var(--gold-bright)}

.v21-quarter-grid{display:grid;grid-template-columns:repeat(4,minmax(170px,1fr));gap:9px}

.v21-quarter-top b{font-size:13px}.v21-quarter-state{font-size:8.5px;padding:3px 6px;border-radius:999px;background:#252526;color:var(--text-dim)}
.v21-quarter.credit .v21-quarter-state{color:#82d5aa;background:rgba(92,185,138,.12)}
.v21-quarter.payable .v21-quarter-state{color:#ebc77e;background:rgba(224,176,84,.12)}

.v21-tax-note{border:1px solid rgba(201,162,75,.24);background:rgba(201,162,75,.06);border-radius:12px;padding:11px 13px;color:#b8aa91;font-size:10px;margin:12px 0}

.v21-name-list{display:grid;gap:7px;max-height:560px;overflow:auto;padding-left:3px}

.v21-name-row h4{font-size:13px;color:#fff;margin:0}.v21-name-row small{display:block;color:var(--text-faint);font-size:9px;margin-top:2px;direction:ltr;text-align:right}.v21-name-meta{display:flex;gap:7px;flex-wrap:wrap}.v21-name-meta span{font-size:8.5px;color:#b7aa94;border:1px solid #343028;background:#1a1814;border-radius:7px;padding:3px 6px}

</head><body><div class="page"><div class="actions"><button class="btn primary" onclick="window.print()">طباعة / حفظ PDF</button><button class="btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">أعلى التقرير</button></div>
<header class="hero"><div class="brand"><div class="logo"><b>DM</b></div><div class="brand-name"><b>DOT ALMASIAH</b><span>MONTHLY PERFORMANCE REPORT</span></div></div><div class="hero-grid"><div class="hero-copy"><h1>${escV11(stageTitle)} — ${escV11(reportMonthLabelV18(month))}</h1><p>${stageDesc}</p><div class="chips"><span class="chip">بيانات المتجر محدثة</span><span class="chip">هدف شهري ${ar(target.target)} ماسة</span><span class="chip">${escV11(broadcasterStatus)}</span></div></div><div class="hero-meta"><div><span>آخر مبيعات مسجلة</span><b>${reportDateLabelV18(lastSale)}</b></div><div><span>آخر قيد مالي</span><b>${reportDateLabelV18(lastEntry)}</b></div><div><span>تاريخ التصدير</span><b>${escV11(fmtDT(nowISO()))}</b></div><div><span>حالة التقرير</span><b>${isCurrent?'مرحلي غير نهائي':'شهري'}</b></div></div></div></header>
<main class="content"><section class="goal-panel"><div class="ring-wrap"><div class="ring"><div class="ring-center"><strong>${pct(progress)}</strong><span>تحقيق هدف الألماس</span></div></div></div><div class="goal-copy"><h3>${escV11(targetStatus)}</h3><p>${targetText}</p><div class="goal-stats"><div class="goal-stat"><span>الألماس المباع</span><b>${ar(summary.sold)}</b><small>حتى آخر مبيعات مسجلة</small></div><div class="goal-stat"><span>${progress>=1?'المتجاوز من الهدف':'المتبقي من الهدف'}</span><b>${ar(progress>=1?exceeded:remaining)}</b><small>من أصل ${ar(target.target)}</small></div><div class="goal-stat"><span>المطلوب يوميًا</span><b>${ar(dailyNeed)}</b><small>${remainingDays?`خلال ${remainingDays} يومًا متبقيًا`:'انتهى نطاق الشهر'}</small></div><div class="goal-stat"><span>المتوقع بنهاية الشهر</span><b>${ar(projected)}</b><small>${isCurrent?'وفق متوسط الفترة المسجلة':'النتيجة الفعلية للشهر'}</small></div></div></div></section>
<section class="section"><div class="section-head"><div><h2>الملخص المالي</h2><p>وفق متوسط تكلفة الألماس وضريبة القيمة المضافة والمصروفات المسجلة.</p></div></div><div class="cards"><div class="card"><div class="label">مبيعات المتجر</div><div class="value">${sar(summary.sales)} ر.س</div><div class="foot">شامل ضريبة القيمة المضافة</div></div><div class="card"><div class="label">صافي ربح المتجر</div><div class="value">${sar(summary.net)} ر.س</div><div class="foot">بعد تكلفة المباع والمصروفات</div></div><div class="card"><div class="label">هامش الربح</div><div class="value">${pct(summary.margin)}</div><div class="foot">من إجمالي المبيعات شامل الضريبة</div></div><div class="card ${hasBroadcasters?'':'pending'}"><div class="label">ربح الوكالة</div><div class="value">${hasBroadcasters?`${sar(bc.commissionSAR)} ر.س`:'بانتظار كشف الرواتب'}</div><div class="foot">${hasBroadcasters?`${ar(bc.broadcasters)} مذيعًا بعد الدمج`:'لا يُعرض كصفر قبل ورود الكشف'}</div></div><div class="card ${hasBroadcasters?'':'pending'}"><div class="label">الربح الشامل</div><div class="value">${hasBroadcasters?`${sar(comprehensive)} ر.س`:'غير نهائي'}</div><div class="foot">صافي المتجر + عمولة الوكالة فقط</div></div><div class="card"><div class="label">متوسط المبيعات اليومي</div><div class="value">${sar(avgSales)} ر.س</div><div class="foot">بحسب ${ar(coverageDay)} يومًا من الشهر</div></div><div class="card"><div class="label">متوسط الألماس اليومي</div><div class="value">${ar(avgDiamonds)}</div><div class="foot">ماسة يوميًا حتى آخر بيع</div></div><div class="card"><div class="label">المخزون التقديري</div><div class="value">${ar(stockQty)}</div><div class="foot">بتكلفة صافية تقديرية ${sar(stockCost)} ر.س</div></div></div></section>
<section class="section"><div class="section-head"><div><h2>مقارنة مع الفترة المماثلة</h2><p>حتى اليوم ${ar(compareThrough)} من ${escV11(reportMonthLabelV18(prevMonth))}؛ لتجنب مقارنة شهر جزئي بشهر كامل.</p></div></div><div class="compare-grid"><div class="compare"><div class="top"><div><span>المبيعات</span><strong>${sar(summary.sales)}</strong></div><em class="delta ${ds.cls}">${ds.text}</em></div><small>الفترة السابقة: ${sar(prev.sales)} ر.س</small></div><div class="compare"><div class="top"><div><span>الألماس المباع</span><strong>${ar(summary.sold)}</strong></div><em class="delta ${dd.cls}">${dd.text}</em></div><small>الفترة السابقة: ${ar(prev.sold)} ماسة</small></div><div class="compare"><div class="top"><div><span>صافي الربح</span><strong>${sar(summary.net)}</strong></div><em class="delta ${dn.cls}">${dn.text}</em></div><small>الفترة السابقة: ${sar(prev.net)} ر.س</small></div><div class="compare"><div class="top"><div><span>هامش الربح</span><strong>${pct(summary.margin)}</strong></div><em class="delta ${dm.cls}">${dm.text}</em></div><small>الفترة السابقة: ${pct(prev.margin)}</small></div></div></section>

const V19_LAST_EXTERNAL_BACKUP = 'dot_v19_lastExternalBackup';

function v19MonthLabel(month){
  if(!/^\d{4}-\d{2}$/.test(String(month||''))) return String(month||'');
  const [y,m]=month.split('-').map(Number);
  return new Date(y,m-1,1).toLocaleDateString('ar-SA',{year:'numeric',month:'long'});
}
function v19ShowLoading(title='جاري تجهيز التقرير', detail='تتم معالجة البيانات وإنشاء النسخة القابلة للطباعة.'){
  document.getElementById('v19-loading')?.remove();
  const el=document.createElement('div');
  el.id='v19-loading'; el.className='v19-loading';
  el.innerHTML=`<div class="v19-loading-box"><div class="v19-loading-mark"></div><b>${escV11(title)}</b><span>${escV11(detail)}</span></div>`;
  document.body.appendChild(el);
}
function v19HideLoading(){ document.getElementById('v19-loading')?.remove(); }
function v19RunWithLoading(title, fn){
  v19ShowLoading(title);
  requestAnimationFrame(()=>setTimeout(()=>{
    try{ fn(); } finally { setTimeout(v19HideLoading,140); }
  },70));
}
function v19LatestBackupDate(){
  const snaps=loadT(DB.snapshots).slice().sort((a,b)=>String(b.ts||'').localeCompare(String(a.ts||'')));
  const external=localStorage.getItem(V19_LAST_EXTERNAL_BACKUP)||'';
  const candidates=[snaps[0]?.ts,external].filter(Boolean).sort();
  return candidates[candidates.length-1]||'';
}
function v19UpdateSidebarMeta(){
  const foot=document.querySelector('.sidebar-foot'); if(!foot) return;
  const latest=v19LatestBackupDate();
  foot.innerHTML=`نسخة ERP v36 الاحترافية · تخزين مستقل<span class="v19-backup-meta">آخر نسخة احتياطية: ${latest?escV11(fmtDT(latest)):'لم تُنشأ بعد'}</span>`;
}
function v19AnnualHistoryHtml(){
  const rows=getStoreSeries().filter(r=>/^\d{4}-\d{2}-\d{2}$/.test(String(r.date||'')));
  const byYear={};
  rows.forEach(r=>{
    const y=String(r.date).slice(0,4);
    if(!byYear[y]) byYear[y]={sales:0,net:0,rows:0,months:new Set()};
    byYear[y].sales+=num(r.salesIncl); byYear[y].net+=num(r.netProfit); byYear[y].rows++; byYear[y].months.add(String(r.date).slice(0,7));
  });
  const years=Object.keys(byYear).sort();
  if(!years.length) return '';
  return `<div class="panel v19-annual-panel" id="v19-annual-history"><div class="panel-head"><div><h3>الأداء السنوي التاريخي</h3><div class="table-note">منفصل عن الرسم الشهري حتى لا تظهر القيود السنوية كأنها أشهر مستقلة.</div></div></div><div class="v19-annual-grid">${years.map(y=>{
    const r=byYear[y];
    return `<div class="v19-year-card"><div class="year">${escV11(y)} · ${ar(r.rows)} قيد</div><div class="net ${r.net<0?'neg':''}">${sar(r.net)} ر.س</div><div class="sales">مبيعات ${sar(r.sales)} ر.س</div></div>`;
  }).join('')}</div></div>`;
}

renderMonthlyChart = function(container){
  const series=getStoreSeries().filter(r=>r.date);
  const yearInfo={};
  series.forEach(r=>{
    const y=String(r.date).slice(0,4), m=String(r.date).slice(0,7);
    if(!yearInfo[y]) yearInfo[y]=new Set(); yearInfo[y].add(m);
  });
  const multiYears=Object.keys(yearInfo).filter(y=>yearInfo[y].size>1).sort();
  const selectedYear=multiYears[multiYears.length-1] || Object.keys(yearInfo).sort().slice(-1)[0];
  if(!selectedYear){ container.innerHTML='<div class="empty">لا توجد بيانات كافية لعرض الرسم البياني</div>'; return; }
  const byMonth={};
  series.filter(r=>String(r.date).startsWith(selectedYear+'-')).forEach(e=>{
    const m=String(e.date).slice(0,7); byMonth[m]=(byMonth[m]||0)+num(e.netProfit);
  });
  const months=Object.keys(byMonth).sort();
  if(!months.length){ container.innerHTML='<div class="empty">لا توجد بيانات شهرية لهذا العام</div>'; return; }
  const max=Math.max(...months.map(m=>Math.abs(byMonth[m])),1);
  container.innerHTML=`<div class="chart">${months.map(m=>{
    const v=byMonth[m], h=Math.max(4,Math.round(Math.abs(v)/max*130));
    const monthName=new Date(Number(m.slice(0,4)),Number(m.slice(5,7))-1,1).toLocaleDateString('ar-SA',{month:'short'});
    return `<div class="bar-col"><div style="font-size:10px;color:var(--text-dim);">${sar(v)}</div><div class="bar ${v<0?'neg':''}" style="height:${h}px;"></div><div class="lbl">${escV11(monthName)}</div></div>`;
  }).join('')}</div>`;
  const panel=container.closest('.panel');
  const h3=panel?.querySelector('h3'); if(h3) h3.textContent=`أداء أشهر ${selectedYear} — صافي ربح المتجر`;
};

function v19EditTarget(){
  const current=num(loadSettings().monthlyDiamondTarget||3000000);
  openModal('تعديل هدف الألماس الشهري',`
    <div class="field"><label>الهدف الشهري بالماسات</label><input type="number" min="0" step="1" id="v19-target-input" value="${current}"></div>
    <div class="alert info mt">يمكن تعديل الهدف أيضًا من قسم النسخ الاحتياطي والإعدادات. لا يتغير أي قيد مالي عند تعديل الهدف.</div>
  `,'<button class="btn" id="v19-close-target">إلغاء</button><button class="btn primary" id="v19-save-target">حفظ الهدف</button>');
  document.getElementById('v19-close-target')?.addEventListener('click',closeModal);
  document.getElementById('v19-save-target')?.addEventListener('click',()=>{
    const value=num(document.getElementById('v19-target-input')?.value);
    if(value<=0){alert('أدخل هدفًا أكبر من صفر.');return;}
    const settings=loadSettings(); settings.monthlyDiamondTarget=value; saveSettings(settings);
    logAudit('تحديث هدف الألماس الشهري',{monthlyDiamondTarget:value,source:'dashboard-v19'});
    closeModal(); render();
  });
  setTimeout(()=>document.getElementById('v19-target-input')?.focus(),30);
}

function v19RebuildPrimaryCards(main){
  const {from,to}=computePeriodRange();

  const bcRows=loadT(DB.broadcast).filter(b=>monthInRange(b.month,from,to));
  const sales=storeRows.reduce((a,e)=>a+num(e.salesIncl),0);
  const cogs=storeRows.reduce((a,e)=>a+num(e.cogs),0);
  const expenses=storeRows.reduce((a,e)=>a+storeExpenses(e),0);
  const profit=storeRows.reduce((a,e)=>a+num(e.netProfit),0);
  const margin=sales?profit/sales:0;
  const sold=storeRows.reduce((a,e)=>a+num(e.diamondsSold),0);
  const purchased=storeRows.reduce((a,e)=>a+num(e.diamondsPurchased),0);
  const stock=currentStockV18();
  const computedBc=bcRows.map(computeBroadcaster);
  const salary=computedBc.reduce((a,b)=>a+num(b.salarySAR),0);
  const commission=computedBc.reduce((a,b)=>a+num(b.commissionSAR),0);
  const total=salary+commission;
  const hasBc=bcRows.length>0;
  const broadcasters=hasBc?new Set(bcRows.map(r=>canonicalBroadcaster(r).key)).size:0;
  const grand=profit+commission;
  const cards=main.querySelector('.cards'); if(!cards) return;
  cards.className='cards v19-primary-cards';
  cards.innerHTML=`
    <div class="card"><div class="label">مبيعات المتجر</div><div class="value">${sar(sales)} ر.س</div><div class="foot">إجمالي المبيعات شامل الضريبة</div></div>
    <div class="card v19-profit"><div class="label">صافي ربح المتجر</div><div class="value ${profit>=0?'pos':'neg'}">${sar(profit)} ر.س</div><div class="foot">بعد تكلفة المباع والمصروفات</div></div>
    <div class="card"><div class="label">هامش الربح</div><div class="value">${pct(margin)}</div><div class="foot">نسبة صافي الربح من المبيعات</div></div>
    <div class="card"><div class="label">الألماس المباع</div><div class="value">${ar(sold)}</div><div class="foot">خلال الفترة المحددة</div></div>
    <div class="card"><div class="label">المخزون الحالي</div><div class="value">${ar(stock)}</div><div class="foot">الرصيد التقديري بعد آخر قيد</div></div>
    <div class="card ${hasBc?'v19-status-ok':'v19-pending'}"><div class="label">حالة كشف المذيعين</div><div class="value">${hasBc?'تم الاعتماد':'بانتظار كشف الرواتب'}</div><div class="foot">${hasBc?`${ar(broadcasters)} مذيع · عمولة الوكالة ${sar(commission)} ر.س`:'يُسجل بعد نهاية الشهر وورود الكشف من الإدارة'}</div></div>`;

  main.querySelector('.v19-financial-details')?.remove();
  cards.insertAdjacentHTML('afterend',`<details class="v19-financial-details"><summary><span>التفاصيل المالية والتشغيلية</span><small>عرض المؤشرات الإضافية عند الحاجة</small></summary><div class="v19-detail-grid">
    <div class="v19-detail-item"><span>الألماس المشترى</span><b>${ar(purchased)}</b><small>خلال الفترة المحددة</small></div>
    <div class="v19-detail-item"><span>تكلفة الألماس المباع</span><b>${sar(cogs)} ر.س</b><small>حسب متوسط التكلفة</small></div>
    <div class="v19-detail-item"><span>مصروفات التشغيل</span><b>${sar(expenses)} ر.س</b><small>وفق القيود المسجلة</small></div>
    <div class="v19-detail-item ${hasBc?'':'pending'}"><span>رواتب المذيعين</span><b>${hasBc?`${sar(salary)} ر.س`:'بانتظار الكشف'}</b><small>لا تدخل ضمن الربح الشامل</small></div>
    <div class="v19-detail-item ${hasBc?'':'pending'}"><span>عمولة الوكالة</span><b>${hasBc?`${sar(commission)} ر.س`:'بانتظار الكشف'}</b><small>تمثل ربح وكالة المذيعين</small></div>
    <div class="v19-detail-item ${hasBc?'':'pending'}"><span>إجمالي ملف المذيعين</span><b>${hasBc?`${sar(total)} ر.س`:'بانتظار الكشف'}</b><small>الرواتب + عمولة الوكالة</small></div>
    <div class="v19-detail-item ${hasBc?'':'pending'}"><span>الربح الشامل</span><b>${hasBc?`${sar(grand)} ر.س`:'غير نهائي'}</b><small>صافي المتجر + عمولة الوكالة</small></div>

/* =========================================================
   v20 — Smart Broadcaster ID Merge Center
   ========================================================= */
function v20Unique(values){
  const seen=new Set(), out=[];
  (values||[]).forEach(v=>{const s=String(v||'').trim();const k=normKey(s);if(s&&!seen.has(k)){seen.add(k);out.push(s);}});
  return out;
}
function v20IdentityRows(){
  const map=new Map();
  loadT(DB.broadcast).forEach(r=>{
    const name=String(r.broadcasterName||'').trim();
    const bigoId=String(r.bigoId||'').trim();
    const uid=String(r.uid||'').trim();
    if(!name&&!bigoId&&!uid) return;
    const key=[normKey(name),normKey(bigoId),normKey(uid)].join('|');
    if(!map.has(key)) map.set(key,{key,name:name||bigoId||uid||'—',bigoId,uid,rows:0,months:new Set(),recordIds:[],salarySAR:0,commissionSAR:0,totalSAR:0,lastMonth:''});
    const x=map.get(key), c=computeBroadcaster(r);
    x.rows++; x.recordIds.push(r.id); if(r.month)x.months.add(r.month);
    x.salarySAR+=num(c.salarySAR); x.commissionSAR+=num(c.commissionSAR); x.totalSAR+=num(c.totalSAR);
    if(String(r.month||'')>x.lastMonth)x.lastMonth=String(r.month||'');
  });
  return [...map.values()].map(x=>({...x,months:[...x.months].sort()})).sort((a,b)=>String(b.lastMonth).localeCompare(String(a.lastMonth))||b.rows-a.rows||a.name.localeCompare(b.name,'ar'));
}
function v20IdentityTokens(x){ return v20Unique([x.name,x.bigoId,x.uid]).map(normKey); }
function v20AliasGroupForIdentity(x,groups=loadAliases()){
  const tokens=v20IdentityTokens(x);
  return groups.find(g=>aliasValues(g).some(v=>tokens.includes(v)))||null;
}
function v20PrimaryName(items){
  const scores=new Map();
  items.forEach(x=>{
    const n=String(x.name||'').trim(); if(!n)return;
    let score=num(x.rows)*10 + (x.lastMonth?Number(x.lastMonth.replace('-',''))/100000:0);
    if(normKey(n)!==normKey(x.bigoId)&&normKey(n)!==normKey(x.uid)) score+=7;
    scores.set(n,(scores.get(n)||0)+score);
  });
  return [...scores.entries()].sort((a,b)=>b[1]-a[1])[0]?.[0] || items[0]?.name || items[0]?.bigoId || items[0]?.uid || 'مذيع';
}
function v20SuggestionMetrics(items){
  const ids=new Set(items.flatMap(x=>x.recordIds||[])), months=new Set();
  let salary=0,commission=0,total=0;
  loadT(DB.broadcast).forEach(r=>{if(ids.has(r.id)){const c=computeBroadcaster(r);salary+=num(c.salarySAR);commission+=num(c.commissionSAR);total+=num(c.totalSAR);if(r.month)months.add(r.month);}});
  return {rows:ids.size,months:months.size,salary,commission,total};
}
function v20BuildSuggestions(identities=v20IdentityRows()){
  const groups=loadAliases(), suggestions=[], seen=new Set();
  function add(items,reason,confidence,matchValue){
    items=[...new Map(items.map(x=>[x.key,x])).values()];
    if(items.length<2)return;
    const groupIds=new Set(items.map(x=>v20AliasGroupForIdentity(x,groups)?.id||'').filter(Boolean));
    if(groupIds.size===1 && items.every(x=>v20AliasGroupForIdentity(x,groups))) return;
    const sig=items.map(x=>x.key).sort().join('||'); if(seen.has(sig))return; seen.add(sig);
    suggestions.push({id:'s'+suggestions.length,items,reason,confidence,matchValue,name:v20PrimaryName(items),metrics:v20SuggestionMetrics(items)});
  }
  const byUid=new Map(), byId=new Map(), byName=new Map();
  identities.forEach(x=>{
    if(x.uid){const k=normKey(x.uid);if(!byUid.has(k))byUid.set(k,[]);byUid.get(k).push(x);}
    if(x.bigoId){const k=normKey(x.bigoId);if(!byId.has(k))byId.set(k,[]);byId.get(k).push(x);}
    if(x.name && String(x.name).trim().length>=3){const k=normKey(x.name);if(!byName.has(k))byName.set(k,[]);byName.get(k).push(x);}
  });
  byUid.forEach((items,k)=>{if(new Set(items.map(x=>normKey(x.bigoId||x.name))).size>1)add(items,'تطابق UID نفسه','safe',k);});
  byId.forEach((items,k)=>{if(new Set(items.map(x=>normKey(x.name||x.uid))).size>1)add(items,'تطابق BIGO ID نفسه','safe',k);});
  byName.forEach((items,k)=>{if(new Set(items.map(x=>normKey(x.bigoId||x.uid))).size>1)add(items,'الاسم نفسه ظهر بمعرفات مختلفة','review',k);});
  return suggestions.sort((a,b)=>(a.confidence===b.confidence?b.metrics.rows-a.metrics.rows:(a.confidence==='safe'?-1:1)));
}
function v20SelectedIdentities(){
  const keys=window.__v20AliasSelected||new Set();
  const map=new Map(v20IdentityRows().map(x=>[x.key,x]));
  return [...keys].map(k=>map.get(k)).filter(Boolean);
}
function v20MergePayload(items,name,existingGroup){
  const ids=v20Unique(items.map(x=>x.bigoId).concat(existingGroup?.ids||[]));
  const uids=v20Unique(items.map(x=>x.uid).concat(existingGroup?.uids||[]));
  const names=v20Unique(items.map(x=>x.name).concat(existingGroup?.names||[]).concat(existingGroup?.name||[]));
  return {name:String(name||'').trim()||v20PrimaryName(items),ids,uids,names};
}
function v20SaveAlias(items,name,editId,opts={}){
  if(!items.length){alert('اختر مذيعين اثنين على الأقل للدمج.');return false;}
  const list=loadAliases(), existing=list.find(g=>g.id===editId), payload=v20MergePayload(items,name,existing);
  if(!payload.name||(!payload.ids.length&&!payload.uids.length&&!payload.names.length)){alert('تعذر تكوين مجموعة الدمج.');return false;}
  const tokens=v20Unique([payload.name].concat(payload.ids,payload.uids,payload.names)).map(normKey);
  const conflicts=list.filter(g=>g.id!==editId && aliasValues(g).some(v=>tokens.includes(v)));
  if(conflicts.length&&!opts.silent){
    if(!confirm(`بعض المعرفات مرتبطة حاليًا بـ: ${conflicts.map(g=>g.name).join('، ')}\nسيتم نقلها إلى المجموعة الجديدة دون حذف السجلات. متابعة؟`))return false;
  }
  let next=list.map(g=>{
    if(g.id===editId)return g;
    if(!conflicts.some(c=>c.id===g.id))return g;
    const clean=arr=>(arr||[]).filter(v=>!tokens.includes(normKey(v)));
    return {...g,ids:clean(g.ids),uids:clean(g.uids),names:clean(g.names)};
  }).filter(g=>g.id===editId || (g.ids||[]).length || (g.uids||[]).length || (g.names||[]).length);
  const rec={id:editId||genId('alias'),name:payload.name,ids:payload.ids,uids:payload.uids,names:payload.names,createdAt:existing?.createdAt||nowISO(),updatedAt:nowISO()};
  next=editId?next.map(g=>g.id===editId?rec:g):next.concat(rec);
  saveAliases(next);
  logAudit(editId?'تعديل دمج آيديات مذيع':'إضافة دمج آيديات مذيع',{name:rec.name,ids:rec.ids.join(' / '),uids:rec.uids.join(' / '),names:rec.names.join(' / '),smart:true});
  return true;
}

/* v20.1 — refine identity detection: ignore placeholder names and suggest only real ID changes */
function v20MeaningfulName(v){
  const s=String(v||'').trim();
  if(!s)return false;
  if(/^[-_—.\s]+$/.test(s))return false;
  if(/^(غير معروف|بدون اسم|unknown|null|undefined)$/i.test(s))return false;
  return true;
}
v20IdentityRows=function(){
  const map=new Map();
  loadT(DB.broadcast).forEach(r=>{
    const rawName=String(r.broadcasterName||'').trim();
    const bigoId=String(r.bigoId||'').trim();
    const uid=String(r.uid||'').trim();
    if(!rawName&&!bigoId&&!uid)return;
    const key=bigoId?'id:'+normKey(bigoId):(uid?'uid:'+normKey(uid):'name:'+normKey(rawName));
    if(!map.has(key))map.set(key,{key,name:'',bigoId,uid:'',uids:new Set(),names:new Map(),rows:0,months:new Set(),recordIds:[],salarySAR:0,commissionSAR:0,totalSAR:0,lastMonth:''});
    const x=map.get(key),c=computeBroadcaster(r);
    if(uid)x.uids.add(uid);
    if(v20MeaningfulName(rawName))x.names.set(rawName,(x.names.get(rawName)||0)+1);
    x.rows++;x.recordIds.push(r.id);if(r.month)x.months.add(r.month);
    x.salarySAR+=num(c.salarySAR);x.commissionSAR+=num(c.commissionSAR);x.totalSAR+=num(c.totalSAR);
    if(String(r.month||'')>=x.lastMonth){x.lastMonth=String(r.month||'');if(v20MeaningfulName(rawName))x.latestName=rawName;if(uid)x.latestUid=uid;}
  });
  return [...map.values()].map(x=>{
    const names=[...x.names.entries()].sort((a,b)=>b[1]-a[1]).map(z=>z[0]);
    const uids=[...x.uids];
    const name=(v20MeaningfulName(x.latestName)&&x.latestName)||names[0]||x.bigoId||uids[0]||'—';
    return {...x,name,names,uids,uid:x.latestUid||uids[0]||'',months:[...x.months].sort()};
  }).sort((a,b)=>String(b.lastMonth).localeCompare(String(a.lastMonth))||b.rows-a.rows||a.name.localeCompare(b.name,'ar'));
};
v20IdentityTokens=function(x){return v20Unique([x.name,x.bigoId,x.uid,...(x.names||[]),...(x.uids||[])]).map(normKey);};
v20PrimaryName=function(items){
  const scores=new Map();
  items.forEach(x=>{
    const candidates=v20Unique([x.name,...(x.names||[])]).filter(v20MeaningfulName);
    candidates.forEach((n,i)=>{let score=num(x.rows)*10-i*2;if(normKey(n)!==normKey(x.bigoId)&&!(x.uids||[]).some(u=>normKey(u)===normKey(n)))score+=7;if(n===x.latestName)score+=5;scores.set(n,(scores.get(n)||0)+score);});
  });
  return [...scores.entries()].sort((a,b)=>b[1]-a[1])[0]?.[0]||items[0]?.bigoId||items[0]?.uid||'مذيع';
};
v20BuildSuggestions=function(identities=v20IdentityRows()){
  const groups=loadAliases(),suggestions=[],seen=new Set();
  function add(items,reason,confidence,matchValue){
    items=[...new Map(items.map(x=>[x.key,x])).values()];if(items.length<2)return;
    const distinctIds=new Set(items.map(x=>normKey(x.bigoId)).filter(Boolean));if(distinctIds.size<2)return;
    const groupIds=new Set(items.map(x=>v20AliasGroupForIdentity(x,groups)?.id||'').filter(Boolean));
    if(groupIds.size===1&&items.every(x=>v20AliasGroupForIdentity(x,groups)))return;
    const sig=items.map(x=>x.key).sort().join('||');if(seen.has(sig))return;seen.add(sig);
    suggestions.push({id:'s'+suggestions.length,items,reason,confidence,matchValue,name:v20PrimaryName(items),metrics:v20SuggestionMetrics(items)});
  }
  const byUid=new Map(),byName=new Map();
  identities.forEach(x=>{
    (x.uids||[x.uid]).filter(Boolean).forEach(uid=>{const k=normKey(uid);if(!byUid.has(k))byUid.set(k,[]);byUid.get(k).push(x);});
    v20Unique([x.name,...(x.names||[])]).filter(v20MeaningfulName).forEach(n=>{const k=normKey(n);if(!byName.has(k))byName.set(k,[]);byName.get(k).push(x);});
  });
  byUid.forEach((items,k)=>add(items,'تطابق UID نفسه مع تغيّر BIGO ID','safe',k));
  byName.forEach((items,k)=>add(items,'الاسم نفسه ظهر بأكثر من BIGO ID','review',k));
  return suggestions.sort((a,b)=>(a.confidence===b.confidence?b.metrics.rows-a.metrics.rows:(a.confidence==='safe'?-1:1)));
};
v20MergePayload=function(items,name,existingGroup){
  const ids=v20Unique(items.flatMap(x=>[x.bigoId]).concat(existingGroup?.ids||[]));
  const uids=v20Unique(items.flatMap(x=>x.uids||[x.uid]).concat(existingGroup?.uids||[]));
  const names=v20Unique(items.flatMap(x=>[x.name,...(x.names||[])]).filter(v20MeaningfulName).concat(existingGroup?.names||[]).concat(existingGroup?.name||[]).filter(v20MeaningfulName));
  return {name:String(name||'').trim()||v20PrimaryName(items),ids,uids,names};
};



/* v20.2 — prefer the latest active ID as the primary display name; allow removing current IDs while editing */
v20PrimaryName=function(items){
  const ordered=(items||[]).slice().sort((a,b)=>String(b.lastMonth||'').localeCompare(String(a.lastMonth||''))||b.rows-a.rows);
  const newest=ordered.find(x=>v20MeaningfulName(x.latestName||x.name));
  if(newest)return String(newest.latestName||newest.name).trim();
  const fallback=ordered.find(x=>x.bigoId||x.uid);
  return fallback?.bigoId||fallback?.uid||'مذيع';
};
v20MergePayload=function(items,name,existingGroup){
  const currentTokens=new Set(v20IdentityRows().flatMap(v20IdentityTokens));
  const orphan=arr=>(arr||[]).filter(v=>!currentTokens.has(normKey(v)));
  const ids=v20Unique(items.flatMap(x=>[x.bigoId]).concat(orphan(existingGroup?.ids)));
  const uids=v20Unique(items.flatMap(x=>x.uids||[x.uid]).concat(orphan(existingGroup?.uids)));
  const names=v20Unique(items.flatMap(x=>[x.name,...(x.names||[])]).filter(v20MeaningfulName).concat(orphan(existingGroup?.names)).concat(v20MeaningfulName(existingGroup?.name)&&!currentTokens.has(normKey(existingGroup.name))?[existingGroup.name]:[]));
  return {name:String(name||'').trim()||v20PrimaryName(items),ids,uids,names};
};

function v21QuarterOf(date){const d=String(date||'');if(!/^\d{4}-\d{2}/.test(d))return null;const y=Number(d.slice(0,4)),m=Number(d.slice(5,7));return {year:y,q:Math.ceil(m/3),key:`${y}-Q${Math.ceil(m/3)}`};}
function v21TaxSummary(){
  const groups=new Map();
  getStoreSeries().forEach(r=>{const q=v21QuarterOf(r.date);if(!q)return;if(!groups.has(q.key))groups.set(q.key,{...q,rows:0,salesInc:0,purchasesInc:0,expensesInc:0,outputVat:0,purchaseVat:0,expenseVat:0,net:0});const x=groups.get(q.key);x.rows++;x.salesInc+=num(r.salesInc||r.salesIncl);x.purchasesInc+=num(r.purchasesInc||r.purchasesIncl);x.expensesInc+=num(r.expensesInc||storeExpenses(r));x.outputVat+=num(r.salesVat);x.purchaseVat+=num(r.purchasesVat);x.expenseVat+=num(r.expensesVat);x.net+=num(r.vatDue);});
  const quarters=[...groups.values()].sort((a,b)=>a.year-b.year||a.q-b.q);const total=quarters.reduce((a,x)=>{a.outputVat+=x.outputVat;a.purchaseVat+=x.purchaseVat;a.expenseVat+=x.expenseVat;a.net+=x.net;a.paid+=Math.max(x.net,0);a.credit+=Math.max(-x.net,0);a.rows+=x.rows;return a;},{outputVat:0,purchaseVat:0,expenseVat:0,net:0,paid:0,credit:0,rows:0});return {quarters,total};
}

function canEditCloudSale(x){

function saleActionsHTML(x,includeApproval){

 if(includeApproval&&cloudRole()==='owner'&&x.status==='pending'){

function bindCloudDecisions(){

   const reason=prompt('اكتب سبب الرفض ليظهر للمشرفة:','');
   if(reason===null)return;
   if(!String(reason).trim()){alert('سبب الرفض مطلوب.');return;}

 });

function cloudActivityEvents(){

 rows.forEach(x=>{
   const who=x.createdByName||x.createdByEmail||'المستخدم';
   const created=x.createdAt?.toDate?.()?.toISOString?.()||x.createdAt||x.saleDate;
   push(created,'created',x.requestType?(x.requestType==='edit'?'طلب تعديل':'طلب إلغاء'):'تسجيل عملية',x.requestType?`للعملية #${String(x.targetOrderNumber||x.targetSaleId).slice(-6)}`:`${cloudNum(x.diamonds)} ماسة · ${cloudMoney(x.amount)}`,who);

   if(x.status==='rejected')push(x.approvedAt?.toDate?.()?.toISOString?.()||x.updatedAt?.toDate?.()?.toISOString?.()||x.saleDate,'rejected','رفض',x.rejectionReason?`السبب: ${x.rejectionReason}`:'تم رفض العملية أو الطلب.',x.approvedByEmail||'المالك');
   if(x.status==='cancelled')push(x.cancelledAt?.toDate?.()?.toISOString?.()||x.updatedAt?.toDate?.()?.toISOString?.(),'cancelled','إلغاء عملية','تم إلغاء العملية وإعادة أثر المخزون عند الحاجة.',x.cancelledByEmail||'المالك');

function renderCloudExpenses(main){if(cloudRole()!=='owner')return;const rows=window.DOT_CLOUD.state.expenses||[];main.innerHTML=`<div class="page-head"><div><h2>المصاريف</h2><div class="sub">قسم خاص بالمالك ويؤثر في قراءة صافي الأرباح.</div></div></div><div class="cloud-kpis"><div class="cloud-kpi"><span>إجمالي المصاريف السحابية</span><b>${cloudMoney(rows.reduce((a,x)=>a+Number(x.amount||0),0))}</b></div><div class="cloud-kpi"><span>عدد القيود</span><b>${cloudNum(rows.length)}</b></div></div><div class="panel"><h3>تسجيل مصروف</h3><div class="field-grid"><div class="field"><label>التاريخ</label><input id="ce-date" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div class="field"><label>المبلغ</label><input id="ce-amount" type="number" min="0" step="0.01"></div><div class="field"><label>التصنيف</label><select id="ce-category"><option>رواتب</option><option>تسويق وإعلانات</option><option>عمولات تحويل</option><option>اشتراكات وبرامج</option><option>رسوم بنكية</option><option>ضريبة</option><option>مصاريف تشغيل</option><option>أخرى</option></select></div><div class="field"><label>المستفيد</label><input id="ce-payee"></div><div class="field"><label>طريقة الدفع</label><select id="ce-payment"><option>تحويل بنكي</option><option>المتجر</option><option>أخرى</option></select></div><div class="field"><label>المرجع</label><input id="ce-ref"></div></div><div class="cloud-form-actions"><button class="btn primary" id="ce-save">حفظ المصروف</button><span class="cloud-msg" id="ce-msg"></span></div></div><div class="panel"><h3>سجل المصاريف</h3>${rows.length?`<div class="table-wrap"><table><thead><tr><th>التاريخ</th><th>التصنيف</th><th>المبلغ</th><th>المستفيد</th><th>الدفع</th></tr></thead><tbody>${rows.map(x=>`<tr><td>${cloudDate(x.expenseDate)}</td><td>${x.category||'—'}</td><td>${cloudMoney(x.amount)}</td><td>${x.payee||'—'}</td><td>${x.payment||'—'}</td></tr>`).join('')}</tbody></table></div>`:'<div class="empty">لا توجد مصاريف سحابية بعد.</div>'}</div>`;document.getElementById('ce-save').onclick=async()=>{const a=Number(document.getElementById('ce-amount').value),m=document.getElementById('ce-msg');if(!a){m.textContent='أدخل مبلغ المصروف.';return}try{await window.DOT_CLOUD.addExpense({expenseDate:document.getElementById('ce-date').value,amount:a,category:document.getElementById('ce-category').value,payee:document.getElementById('ce-payee').value.trim(),payment:document.getElementById('ce-payment').value,reference:document.getElementById('ce-ref').value.trim()});m.textContent='تم حفظ المصروف.'}catch(e){m.textContent=e.message||e}}}

function renderCloudUsers(main){

 main.innerHTML=`<div class="page-head"><div><h2>المشرفون والصلاحيات</h2><div class="sub">فئتان فقط: المالك والمشرف. المشرف لا يرى المذيعين أو الأرباح أو الضريبة أو المصاريف.</div></div></div><div class="alert info">الحساب الجديد يبقى <b>بانتظار التفعيل</b> حتى تضغط «تفعيل الحساب» من هذه الصفحة.</div>${desktop}${mobile}<div id="cloud-user-msg" class="cloud-msg" style="margin-top:12px"></div>`;
 document.querySelectorAll('[data-user-status]').forEach(b=>b.onclick=async()=>{const msg=document.getElementById('cloud-user-msg'),old=b.textContent;b.disabled=true;b.textContent='جاري الحفظ…';try{await window.DOT_CLOUD.setUserStatus(b.dataset.userStatus,b.dataset.next);msg.textContent=b.dataset.next==='active'?'تم تفعيل حساب المشرف.':'تم إيقاف حساب المشرف.';}catch(e){msg.textContent=e.message||e;b.disabled=false;b.textContent=old;}})
 document.querySelectorAll('[data-user-name]').forEach(b=>b.onclick=async()=>{const msg=document.getElementById('cloud-user-msg'),name=prompt('اكتب اسم المستخدم الذي سيظهر في الترحيب والتقارير:',b.dataset.currentName||'');if(name===null)return;if(!name.trim()){msg.textContent='الاسم لا يمكن أن يكون فارغًا.';return}try{await window.DOT_CLOUD.setUserName(b.dataset.userName,name.trim());msg.textContent='تم تحديث الاسم.';}catch(e){msg.textContent=e.message||e}})

function updateSyncStatus(){
 const pill=document.getElementById('sync-status-pill'),text=document.getElementById('sync-status-text');
 const account=document.getElementById('account-menu-wrap');
 const roleEl=document.getElementById('account-display-role');
 const sync=window.DOT_CLOUD?.state?.sync||{}, online=navigator.onLine;
 if(pill)pill.classList.remove('offline','syncing');
 if(account)account.classList.remove('offline','syncing');
 const baseRole=window.DOT_CLOUD?.state?.profile?.role==='owner'?'المالك':'المشرف';
 if(!online||sync.status==='offline'){
   if(pill)pill.classList.add('offline');
   if(account)account.classList.add('offline');
   if(text)text.textContent='دون اتصال';
   if(roleEl)roleEl.textContent=`${baseRole} · دون اتصال`;
   return;
 }
 if(sync.status==='syncing'){
   if(pill)pill.classList.add('syncing');
   if(account)account.classList.add('syncing');
   if(text)text.textContent='جاري المزامنة…';
   if(roleEl)roleEl.textContent=`${baseRole} · مزامنة`;
   return;
 }
 const last=sync.lastSync?new Date(sync.lastSync):null;
 if(text)text.textContent=last&&!Number.isNaN(last.getTime())?`متصل · ${last.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`:'متصل';
 if(roleEl)roleEl.textContent=`${baseRole} · متصل`;
}

 btn.classList.toggle('hidden',app.view==='cloudNewSale'||!cloudReady());
}

function updateAccountMenu(){
  const cloud=window.DOT_CLOUD;
  if(!cloud?.state?.profile)return;
  const p=cloud.state.profile||{},u=cloud.state.user||{};
  const name=(p.name||u.displayName||u.email||'المستخدم').trim();
  const role=p.role==='owner'?'المالك':'المشرف';
  const email=u.email||p.email||'';
  const nameEl=document.getElementById('account-display-name');
  const roleEl=document.getElementById('account-display-role');
  const dropName=document.getElementById('account-dropdown-name');
  const dropEmail=document.getElementById('account-dropdown-email');
  if(nameEl)nameEl.textContent=name;
  if(roleEl)roleEl.textContent=`${role} · ${navigator.onLine?'متصل':'دون اتصال'}`;
  if(dropName)dropName.textContent=`${name} · ${role}`;
  if(dropEmail)dropEmail.textContent=email;
}
const accountWrap=document.getElementById('account-menu-wrap');
const accountBtn=document.getElementById('account-menu-btn');
accountBtn?.addEventListener('click',e=>{
  e.stopPropagation();
  const open=accountWrap?.classList.toggle('open');
  accountBtn.setAttribute('aria-expanded',open?'true':'false');
});
document.addEventListener('click',e=>{
  if(accountWrap&&!accountWrap.contains(e.target)){
    accountWrap.classList.remove('open');
    accountBtn?.setAttribute('aria-expanded','false');
  }
});
document.getElementById('account-logout')?.addEventListener('click',()=>{
  accountWrap?.classList.remove('open');
  window.DOT_CLOUD?.logout();
});

window.addEventListener('dot-cloud-ready',e=>{const role=e.detail.profile.role;document.getElementById('cloud-loading')?.classList.add('hidden');document.getElementById('cloud-role-label').textContent=role==='owner'?'المالك · صلاحية كاملة':'المشرف · مبيعات فقط';updateAccountMenu();updateSyncStatus();app.view=role==='owner'?'dashboard':'supervisorHome';render()});
window.addEventListener('dot-cloud-update',()=>{updateAccountMenu();updateSyncStatus();if(cloudReady()&&['dashboard','store','supervisorHome','cloudApprovals','cloudSales','cloudPurchases','cloudStock','cloudExpenses','cloudUsers','cloudActivity'].includes(app.view))render()});
document.getElementById('cloud-logout')?.addEventListener('click',()=>window.DOT_CLOUD?.logout());
document.getElementById('quick-sale-fab')?.addEventListener('click',()=>{app.view='cloudNewSale';closeMobileNav();render()});
window.addEventListener('online',updateSyncStatus);
window.addEventListener('offline',updateSyncStatus);
document.getElementById('mobile-menu-btn')?.addEventListener('click',()=>{document.querySelector('.sidebar')?.classList.toggle('mobile-open');document.getElementById('mobile-overlay')?.classList.toggle('show')});
document.getElementById('mobile-overlay')?.addEventListener('click',closeMobileNav);

/* ---------- init ---------- */
render();
</script>
