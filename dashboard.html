<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOT ALMASIAH · ERP v36</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0a0a0b;
  --bg-panel:#131315;
  --bg-elevated:#1b1b1e;
  --bg-input:#0f0f11;
  --border:#2a2a2e;
  --border-light:#38383d;
  --gold:#c9a24b;
  --gold-bright:#e8c874;
  --gold-dim:#8a6a3d;
  --text:#ede6d6;
  --text-dim:#9c968c;
  --text-faint:#6b665f;
  --success:#5cb98a;
  --danger:#e0645a;
  --warning:#e0b054;
  --radius:10px;
  --font-display:'El Messiri',serif;
  --font-body:'IBM Plex Sans Arabic',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-size:14px;
  line-height:1.6;
  overflow:hidden;
}
#app{display:flex;height:100vh;}

/* ===== Sidebar ===== */
.sidebar{
  width:230px;
  background:linear-gradient(180deg,#111113,#0a0a0b);
  border-left:1px solid var(--border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
}
.brand{
  padding:24px 18px 18px;
  border-bottom:1px solid var(--border);
  text-align:center;
}
.brand .mark{
  width:52px;height:52px;margin:0 auto 10px;
  border-radius:50%;
  border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);
  font-weight:700;font-size:20px;color:var(--gold-bright);
  box-shadow:0 0 0 1px var(--gold-dim), inset 0 0 12px rgba(201,162,75,.15);
  position:relative;
}
.brand .mark::after{
  content:"";position:absolute;inset:-6px;border-radius:50%;
  border:1px solid rgba(201,162,75,.25);
}
.brand h1{font-family:var(--font-display);font-size:16px;color:var(--gold-bright);letter-spacing:.5px;}
.brand p{font-size:10.5px;color:var(--text-faint);margin-top:3px;letter-spacing:1px;}
nav.navlist{flex:1;overflow-y:auto;padding:14px 10px;}
.navbtn{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:11px 14px;margin-bottom:4px;
  background:transparent;border:1px solid transparent;border-radius:8px;
  color:var(--text-dim);font-family:var(--font-body);font-size:13.5px;font-weight:500;
  cursor:pointer;text-align:right;transition:.15s;
}
.navbtn:hover{background:var(--bg-elevated);color:var(--text);}
.navbtn.active{
  background:linear-gradient(90deg, rgba(201,162,75,.14), rgba(201,162,75,.03));
  border-color:var(--gold-dim);
  color:var(--gold-bright);
}
.navbtn .ic{width:16px;text-align:center;opacity:.85;}
.sidebar-foot{padding:12px 16px;border-top:1px solid var(--border);font-size:10.5px;color:var(--text-faint);text-align:center;}

/* ===== Main ===== */
main{flex:1;overflow-y:auto;padding:26px 32px 60px;}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
.page-head h2{font-family:var(--font-display);font-size:24px;color:var(--gold-bright);}
.page-head .sub{color:var(--text-dim);font-size:12.5px;margin-top:4px;}
.btn{
  background:var(--bg-elevated);color:var(--text);border:1px solid var(--border-light);
  padding:9px 16px;border-radius:8px;cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:500;
  transition:.15s; display:inline-flex; align-items:center; gap:6px;
}
.btn:hover{border-color:var(--gold-dim);color:var(--gold-bright);}
.btn.primary{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#151107;border:none;font-weight:600;}
.btn.primary:hover{filter:brightness(1.1);color:#151107;}
.btn.danger{border-color:var(--danger);color:var(--danger);}
.btn.danger:hover{background:rgba(224,101,90,.1);}
.btn.sm{padding:6px 11px;font-size:12px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:24px;}
.card{
  background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 18px;position:relative;overflow:hidden;
}
.card::before{content:"";position:absolute;top:0;right:0;width:3px;height:100%;background:var(--gold-dim);}
.card.accent::before{background:var(--gold-bright);}
.card .label{font-size:11.5px;color:var(--text-dim);margin-bottom:8px;}
.card .value{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text);}
.card .value.gold{color:var(--gold-bright);}
.card .value.pos{color:var(--success);}
.card .value.neg{color:var(--danger);}
.card .foot{font-size:10.5px;color:var(--text-faint);margin-top:6px;}

/* Panels */
.panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;}
.panel h3{font-family:var(--font-display);font-size:16px;color:var(--gold-bright);margin-bottom:14px;}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}

/* Forms */
.field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11.5px;color:var(--text-dim);}
.field input,.field select,.field textarea{
  background:var(--bg-input);border:1px solid var(--border-light);border-radius:7px;
  padding:9px 10px;color:var(--text);font-family:var(--font-body);font-size:13px;width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold);}
.field input[readonly]{color:var(--text-dim);background:#101012;}
.field.chk{flex-direction:row;align-items:center;gap:8px;}
.hint{font-size:10.5px;color:var(--text-faint);margin-top:2px;}

/* Filters bar */
.filterbar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px;}
.filterbar .field{min-width:140px;}

/* Table */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);}
table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:600px;}
thead th{
  background:var(--bg-elevated);color:var(--gold-bright);font-weight:600;text-align:right;
  padding:10px 12px;border-bottom:1px solid var(--border-light);white-space:nowrap;position:sticky;top:0;
}
tbody td{padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;color:var(--text);}
tbody tr:hover{background:rgba(201,162,75,.04);}
tbody tr:last-child td{border-bottom:none;}
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;}
.tag.confirmed{background:rgba(92,185,138,.15);color:var(--success);}
.tag.imported{background:rgba(201,162,75,.15);color:var(--gold-bright);}
.tag.manual{background:rgba(224,176,84,.15);color:var(--warning);}
.tag.err{background:rgba(224,101,90,.15);color:var(--danger);}
.tag.ok{background:rgba(92,185,138,.15);color:var(--success);} .tag.historical{background:rgba(201,162,75,.12);color:var(--gold-bright);}
.row-actions{display:flex;gap:6px;}
.icon-btn{background:transparent;border:1px solid var(--border-light);border-radius:6px;color:var(--text-dim);width:28px;height:28px;cursor:pointer;font-size:12px;}
.icon-btn:hover{color:var(--gold-bright);border-color:var(--gold-dim);}
.icon-btn.del:hover{color:var(--danger);border-color:var(--danger);}
.empty{text-align:center;padding:40px 20px;color:var(--text-faint);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
.modal{background:var(--bg-panel);border:1px solid var(--border-light);border-radius:12px;width:100%;max-width:640px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-head h3{font-family:var(--font-display);color:var(--gold-bright);font-size:17px;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.close-x{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;}

/* Alerts */
.alert{padding:12px 16px;border-radius:8px;font-size:12.5px;margin-bottom:14px;border:1px solid;}
.alert.warn{background:rgba(224,176,84,.08);border-color:rgba(224,176,84,.35);color:var(--warning);}
.alert.err{background:rgba(224,101,90,.08);border-color:rgba(224,101,90,.35);color:var(--danger);}
.alert.ok{background:rgba(92,185,138,.08);border-color:rgba(92,185,138,.35);color:var(--success);}
.alert.info{background:rgba(201,162,75,.08);border-color:rgba(201,162,75,.35);color:var(--gold-bright);}

/* Tabs (secondary nav) */
.subtabs{display:flex;gap:6px;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap;}
.subtab{padding:9px 16px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:13px;font-family:var(--font-body);border-bottom:2px solid transparent;}
.subtab.active{color:var(--gold-bright);border-color:var(--gold-bright);}

/* Steps (import wizard) */
.steps{display:flex;gap:0;margin-bottom:22px;}
.step{flex:1;text-align:center;padding:10px 6px;border-bottom:2px solid var(--border);color:var(--text-faint);font-size:12px;position:relative;}
.step.active{color:var(--gold-bright);border-color:var(--gold-bright);}
.step.done{color:var(--success);border-color:var(--success);}

/* chart bars */
.chart{display:flex;align-items:flex-end;gap:8px;height:160px;padding:10px 4px;border-bottom:1px solid var(--border);}
.chart .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end;height:100%;}
.chart .bar{width:100%;max-width:34px;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--gold-bright),var(--gold-dim));min-height:2px;}
.chart .bar.neg{background:linear-gradient(180deg,var(--danger),#7a2c26);}
.chart .lbl{font-size:10px;color:var(--text-faint);white-space:nowrap;}

/* small util */
.flex{display:flex;} .gap{gap:10px;} .between{justify-content:space-between;} .center{align-items:center;}
.mt{margin-top:16px;} .mb{margin-bottom:16px;}
.small{font-size:11.5px;color:var(--text-dim);}
.toggle-wrap{display:flex;align-items:center;gap:8px;}
.switch{position:relative;width:38px;height:21px;background:var(--bg-elevated);border:1px solid var(--border-light);border-radius:20px;cursor:pointer;}
.switch.on{background:var(--gold-dim);border-color:var(--gold);}
.switch .dot{position:absolute;top:1px;right:1px;width:17px;height:17px;background:var(--text);border-radius:50%;transition:.2s;}
.switch.on .dot{right:auto;left:1px;background:#151107;}

/* print */
@media print{
  .sidebar,.page-head .btn,.filterbar,.no-print{display:none !important;}
  main{overflow:visible;padding:0;}
  body{background:#fff;color:#000;}
  .print-report{display:block !important;}
}
.print-report{display:none;}

::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:10px;}
::-webkit-scrollbar-track{background:transparent;}

/* ===== v8 Premium broadcaster display ===== */
.amount-main{font-family:var(--font-display);font-size:27px!important;font-weight:800;direction:ltr;text-align:right;line-height:1.15;}
.amount-sub{direction:ltr;text-align:right;color:var(--text-dim)!important;font-size:12px!important;margin-top:7px!important;}
.amount-sub b{color:var(--gold-bright);font-weight:700;}
.broadcaster-hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(245px,1fr));gap:14px;margin-bottom:22px;}
.broadcaster-hero-card{background:linear-gradient(180deg,#171719,#101012);border:1px solid var(--border);border-radius:14px;padding:15px 16px;position:relative;overflow:hidden;min-height:155px;box-shadow:0 12px 28px rgba(0,0,0,.18);}
.broadcaster-hero-card::before{content:"";position:absolute;top:0;right:0;width:4px;height:100%;background:var(--gold-bright);opacity:.85;}
.broadcaster-hero-card::after{content:"";position:absolute;left:-42px;top:-42px;width:120px;height:120px;border-radius:50%;background:rgba(201,162,75,.07);}
.broadcaster-hero-card .rank{position:absolute;top:12px;left:12px;min-width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:rgba(201,162,75,.16);border:1px solid rgba(201,162,75,.28);color:var(--gold-bright);font-weight:800;direction:ltr;}
.broadcaster-hero-card .name{font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--gold-bright);padding-left:42px;margin-bottom:3px;}
.broadcaster-hero-card .ids{font-size:11px;color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:12px;direction:ltr;text-align:right;}

<script type="module" src="./cloud-bridge.js?v=32.0.0"></script>
<script>
/* =========================================================
   DOT ALMASIAH — ERP v36 · Cloud + Local History
   ========================================================= */

/* ---------- Storage Layer ---------- */
const DB = {
  store:      'dot_rescue_v6_storeEntries',
  broadcast:  'dot_rescue_v6_broadcasterCommissions',
  shipping:   'dot_rescue_v6_shippingProfits',
  settings:   'dot_rescue_v6_settings',
  audit:      'dot_rescue_v6_auditLog',
  imports:    'dot_rescue_v6_importBatches',
  snapshots:  'dot_rescue_v6_snapshots',
  aliases:    'dot_rescue_v6_broadcasterAliases',
  locks:      'dot_rescue_v6_lockedMonths'
};

/* تعبئة تلقائية لأول تشغيل ببيانات النسخة المحفوظة حتى 13 يوليو 2026 */
(async function seedHistoricalDataOnce(){
  if(localStorage.getItem(DB.store) || localStorage.getItem(DB.broadcast)) return;
  try{
    const r=await fetch('./historical-data.json',{cache:'no-store'});
    if(!r.ok) return;
    const p=await r.json();
    localStorage.setItem(DB.store,JSON.stringify(p.store||[]));
    localStorage.setItem(DB.broadcast,JSON.stringify(p.broadcast||[]));
    localStorage.setItem(DB.settings,JSON.stringify(p.settings||{}));
    localStorage.setItem(DB.imports,JSON.stringify(p.imports||[]));
    localStorage.setItem(DB.aliases,JSON.stringify(p.aliases||[]));
    localStorage.setItem(DB.locks,JSON.stringify(p.lockedMonths||[]));
    sessionStorage.setItem('dot_v21_seeded','1');
    location.reload();
  }catch(e){console.warn('Historical seed skipped',e)}
})();

function loadT(key){ try{ const v = JSON.parse(localStorage.getItem(key)); return Array.isArray(v)?v:(v||[]); }catch(e){ return []; } }
function saveT(key,data){ localStorage.setItem(key, JSON.stringify(data)); }
function loadSettings(){
  try{
    const s = JSON.parse(localStorage.getItem(DB.settings));
    if(s) return Object.assign({taxRate:0.15, defaultExchangeRate:3.75, openingBalance:0, openingDiamonds:0, openingCostInc:0, monthlySalesTarget:0, monthlyDiamondTarget:3000000}, s);
  }catch(e){}
  return {taxRate:0.15, defaultExchangeRate:3.75, openingBalance:0, openingDiamonds:0, openingCostInc:0, monthlySalesTarget:0, monthlyDiamondTarget:3000000};
}
function saveSettings(s){ localStorage.setItem(DB.settings, JSON.stringify(s)); }
function genId(prefix){ return prefix+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function nowISO(){ return new Date().toISOString(); }
function fmtDT(iso){ const d=new Date(iso); return d.toLocaleString('en-GB',{dateStyle:'medium',timeStyle:'short'}); }

function logAudit(action, meta){
  const log = loadT(DB.audit);
  log.unshift({ id: genId('log'), ts: nowISO(), action, ...meta });
  saveT(DB.audit, log.slice(0,500));
}

function takeSnapshot(reason){
  const snaps = loadT(DB.snapshots);
  const snap = {
    id: genId('snap'), ts: nowISO(), reason,
    data: {
      store: loadT(DB.store),
      broadcast: loadT(DB.broadcast),
      settings: loadSettings(),
      imports: loadT(DB.imports),
      aliases: loadAliases(),
      lockedMonths: loadLockedMonths()
    }
  };
  snaps.unshift(snap);
  saveT(DB.snapshots, snaps.slice(0,20));
  return snap;
}

function restoreSnapshot(id){
  const snaps = loadT(DB.snapshots);
  const snap = snaps.find(s=>s.id===id);
  if(!snap) return false;
  saveT(DB.store, snap.data.store||[]);
  saveT(DB.broadcast, snap.data.broadcast||[]);
  saveSettings(snap.data.settings||loadSettings());
  saveT(DB.imports, snap.data.imports||[]);
  saveAliases(snap.data.aliases||[]);
  saveLockedMonths(snap.data.lockedMonths||[]);
  logAudit('استرجاع نسخة سابقة', {snapshotId:id, snapshotDate: snap.ts});
  return true;
}

/* ---------- Number helpers ---------- */
function num(v){
  if(v === null || v === undefined) return 0;
  if(typeof v === 'number') return isFinite(v) ? v : 0;
  let s = String(v).trim();
  if(!s) return 0;
  const arabic = '٠١٢٣٤٥٦٧٨٩';
  const eastern = '۰۱۲۳۴۵۶۷۸۹';
  s = s.replace(/[٠-٩]/g, d=>String(arabic.indexOf(d)))
       .replace(/[۰-۹]/g, d=>String(eastern.indexOf(d)))
       .replace(/\$/g,'').replace(/ر\.س|ريال|SAR|USD/gi,'')
       .replace(/,/g,'').replace(/\s+/g,'')
       .replace(/−/g,'-');
  const n = Number(s);
  return isFinite(n) ? n : 0;
}
const ARABIC_DIGITS = {'0':'٠','1':'١','2':'٢','3':'٣','4':'٤','5':'٥','6':'٦','7':'٧','8':'٨','9':'٩'};
function toArabicDigits(str){ return String(str); }
function sar(n){ return num(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function money(n,cur){ return sar(n) + ' ' + (cur||'ر.س'); }
function pct(n){ return (num(n)*100).toLocaleString('en-US',{maximumFractionDigits:1}) + '%'; }
function round2(n){ return Math.round(num(n)*100)/100; }
function ar(n){ return Math.round(num(n)).toLocaleString('en-US'); }
function rateFmt(n){ return num(n).toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:4}).replace(/\.?0+$/,''); }

/* ---------- Store calc ----------
   نسخة v3 تطابق منطق النسخة القديمة المعتمدة:
   - المبيعات والمشتريات تُحوّل إلى مبالغ بدون ضريبة.
   - المصروفات تخصم بدون ضريبة إذا كانت قابلة للخصم، وبكامل قيمتها إذا كانت غير قابلة للخصم.
   - تكلفة الألماس المباع تُحتسب بمتوسط التكلفة المرجّح بدون ضريبة.
   - لا يتم خصم كامل المشتريات من الربح؛ فقط تكلفة الألماس المباع. */
function storeExpenses(e){
  return num(e.sallaFees)+num(e.gatewayFees)+num(e.ads)+num(e.transfers)+num(e.opExpenses)+num(e.otherExpenses);
}
function storeBase(e){
  const vatRate = (num(e.vatRate) || (loadSettings().taxRate*100) || 15) / 100;
  const factor = 1 + vatRate;
  const salesInc = num(e.salesIncl), purchasesInc = num(e.purchasesIncl), expensesInc = storeExpenses(e);
  const salesNet = factor ? salesInc/factor : salesInc;
  const purchasesNet = factor ? purchasesInc/factor : purchasesInc;
  const salesVat = salesInc - salesNet;
  const purchasesVat = purchasesInc - purchasesNet;
  let expensesNet = expensesInc, expensesVat = 0;
  const mode = e.expenseVatMode || 'deductible';
  if(mode === 'deductible' && factor){
    expensesNet = expensesInc/factor;
    expensesVat = expensesInc - expensesNet;
  }
  return {
    salesInc, purchasesInc, expensesInc,
    salesNet, purchasesNet, expensesNet,
    salesVat, purchasesVat, expensesVat,
    vatDue: salesVat - purchasesVat - expensesVat,
    diamondsSold: num(e.diamondsSold), diamondsPurchased: num(e.diamondsPurchased)
  };
}
function computeStoreSeries(entries, openingDiamonds, openingCostInc){
  const sorted = [...entries].sort((a,b)=>{
    const d = (a.date||'').localeCompare(b.date||'');
    if(d!==0) return d;
    return String(a.id||a.createdAt||'').localeCompare(String(b.id||b.createdAt||''));
  });
  const openingVatFactor = 1 + ((loadSettings().taxRate || 0.15));
  let cumPurchased = num(openingDiamonds);
  let cumCostNet = openingVatFactor ? num(openingCostInc)/openingVatFactor : num(openingCostInc);
  let cumCostInc = num(openingCostInc);
  let cumSold = 0;
  const out = [];
  sorted.forEach(e=>{
    const c = storeBase(e);
    cumPurchased += c.diamondsPurchased;
    cumCostNet += c.purchasesNet;
    cumCostInc += c.purchasesInc;
    const avgCostNet = cumPurchased ? cumCostNet/cumPurchased : 0;
    const avgCostInc = cumPurchased ? cumCostInc/cumPurchased : 0;
    const cogs = c.diamondsSold * avgCostNet;
    const cogsInc = c.diamondsSold * avgCostInc;
    cumSold += c.diamondsSold;
    const remainingQty = cumPurchased - cumSold;
    const remainingCost = remainingQty * avgCostNet;
    const remainingCostInc = remainingQty * avgCostInc;
    const netProfit = c.salesNet - cogs - c.expensesNet;
    out.push({
      ...e,
      ...c,
      avgCost: round2(avgCostNet),
      avgCostInc: round2(avgCostInc),
      cogs: round2(cogs),
      cogsInc: round2(cogsInc),
      netProfit: round2(netProfit),
      remainingQty: round2(remainingQty),
      remainingCost: round2(remainingCost),
      remainingCostInc: round2(remainingCostInc)
    });
  });
  return out;
}

function cloudUnifiedLedgerEntries(){
  const cloud = window.DOT_CLOUD?.state;
  if(!cloud?.ready) return [];
  const out=[];
  // العمليات السحابية المعتمدة فقط تدخل في مؤشرات المتجر والهدف والأرباح.
  (cloud.sales||[]).filter(x=>x.status==='approved').forEach(x=>out.push({
    id:'cloud-sale-'+x.id,
    date:x.saleDate || x.approvedAt?.toDate?.().toISOString?.().slice(0,10) || '',
    diamondsSold:num(x.diamonds),
    salesIncl:num(x.amount),
    diamondsPurchased:0,
    purchasesIncl:0,
    paymentSource:x.payment==='المتجر'?'other':'bank',
    notes:`مبيعة سحابية ${x.orderNumber||x.id||''}`,
    cloudSource:'sale',
    cloudId:x.id,
    cloudOrderNumber:x.orderNumber||'',
    createdAt:x.createdAt?.toDate?.().toISOString?.() || ''
  }));
  (cloud.purchases||[]).forEach(x=>out.push({
    id:'cloud-purchase-'+x.id,
    date:x.purchaseDate || x.createdAt?.toDate?.().toISOString?.().slice(0,10) || '',
    diamondsSold:0,
    salesIncl:0,
    diamondsPurchased:num(x.diamonds),
    purchasesIncl:num(x.amount),
    paymentSource:'bank',
    notes:`مشتريات سحابية ${x.supplier||''}`,
    cloudSource:'purchase',
    cloudId:x.id,
    createdAt:x.createdAt?.toDate?.().toISOString?.() || ''
  }));
  (cloud.expenses||[]).forEach(x=>out.push({
    id:'cloud-expense-'+x.id,
    date:x.expenseDate || x.createdAt?.toDate?.().toISOString?.().slice(0,10) || '',
    diamondsSold:0,
    salesIncl:0,
    diamondsPurchased:0,
    purchasesIncl:0,
    otherExpenses:num(x.amount),
    expenseVatMode:'non_deductible',
    paymentSource:'other',
    notes:`مصروف سحابي ${x.category||''} ${x.payee||''}`.trim(),
    cloudSource:'expense',
    cloudId:x.id,
    createdAt:x.createdAt?.toDate?.().toISOString?.() || ''
  }));
  return out.filter(x=>x.date);
}
function getStoreSeries(){
  const s = loadSettings();
  const unified = loadT(DB.store).concat(cloudUnifiedLedgerEntries());
  return computeStoreSeries(unified, s.openingDiamonds||0, s.openingCostInc||0);
}

// quick single-record estimate used only for the live preview inside the add/edit form
function estimateAvgCost(){
  const s = loadSettings();
  const rows = loadT(DB.store);
  let qty = num(s.openingDiamonds), costNet = (1+(s.taxRate||0.15)) ? num(s.openingCostInc)/(1+(s.taxRate||0.15)) : num(s.openingCostInc);
  rows.forEach(e=>{ const c=storeBase(e); qty += c.diamondsPurchased; costNet += c.purchasesNet; });
  return qty>0 ? costNet/qty : 0;
}

/* ---------- Broadcaster calc ---------- */
function computeBroadcaster(rec){
  const rate = num(rec.exchangeRate) || loadSettings().defaultExchangeRate;
  const totalUSD = round2(num(rec.salaryUSD) + num(rec.commissionUSD));
  const salarySAR = round2(num(rec.salaryUSD) * rate);
  const commissionSAR = round2(num(rec.commissionUSD) * rate);
  const totalSAR = round2(totalUSD * rate);
  return {...rec, exchangeRate:rate, totalUSD, salarySAR, commissionSAR, totalSAR};
}

/* ---------- v7 Safety helpers: month locks + broadcaster aliases ---------- */
function loadAliases(){ try{ const v=JSON.parse(localStorage.getItem(DB.aliases)); return Array.isArray(v)?v:[]; }catch(e){ return []; } }
function saveAliases(list){ saveT(DB.aliases, Array.isArray(list)?list:[]); }
function loadLockedMonths(){
  try{
    const v=JSON.parse(localStorage.getItem(DB.locks));
    if(Array.isArray(v)) return v;
  }catch(e){}
  const s=loadSettings();
  return Array.isArray(s.closedMonths)?s.closedMonths:[];
}
function saveLockedMonths(list){ saveT(DB.locks, [...new Set((list||[]).filter(Boolean))].sort()); }
function isMonthLocked(month){ return !!month && loadLockedMonths().includes(String(month).slice(0,7)); }
function setMonthLock(month, locked){
  month=String(month||'').slice(0,7);
  if(!/^\d{4}-\d{2}$/.test(month)) return;
  const list=loadLockedMonths().filter(m=>m!==month);
  if(locked) list.push(month);
  saveLockedMonths(list);
  logAudit(locked?'إغلاق شهر':'فك إغلاق شهر', {month});
}
function splitIds(v){ return String(v||'').split(/[\n,،;؛\s]+/).map(x=>x.trim()).filter(Boolean); }
function normKey(v){ return String(v||'').trim().toLowerCase(); }
function aliasValues(group){
  return [group.name].concat(group.ids||[], group.uids||[], group.names||[]).filter(Boolean).map(normKey);
}
function canonicalBroadcaster(rec){
  const candidates = [rec.bigoId, rec.uid, rec.broadcasterName].filter(Boolean).map(normKey);
  const groups = loadAliases();
  const g = groups.find(group => aliasValues(group).some(v => candidates.includes(v)));
  if(g){ return {key:'alias:'+g.id, name:g.name, ids:(g.ids||[]).join(' / '), group:g}; }
  const name = rec.broadcasterName || rec.bigoId || rec.uid || '—';
  const key = rec.bigoId ? 'id:'+normKey(rec.bigoId) : (rec.uid ? 'uid:'+normKey(rec.uid) : 'name:'+normKey(name));
  return {key, name, ids:rec.bigoId||''};
}
function currentMonth(){
  if(app.period && app.period.mode==='monthly' && app.period.from) return app.period.from.slice(0,7);
  return new Date().toISOString().slice(0,7);
}

function targetMonthCount(from, to){
  if(app.period && app.period.mode==='daily') return 1/30;
  if(!from) return 1;
  const start = new Date(String(from).slice(0,7)+'-01');
  const end = to ? new Date(String(to).slice(0,7)+'-01') : start;
  if(isNaN(start) || isNaN(end) || end < start) return 1;
  return Math.max(1, (end.getFullYear()-start.getFullYear())*12 + (end.getMonth()-start.getMonth()) + 1);
}
function targetStatus(progress){
  if(progress >= 1) return {cls:'done', text:'تم تحقيق الهدف'};
  if(progress >= .85) return {cls:'warn', text:'قريب من الهدف'};
  if(progress > 0) return {cls:'', text:'قيد التقدم'};
  return {cls:'danger', text:'لم يبدأ بعد'};
}

function autoBackupBefore(reason){
  try{ takeSnapshot(reason); }catch(e){ console.warn('snapshot failed', e); }
}
function deleteImportBatch(batchId){
  const batches = loadT(DB.imports);
  const batch = batches.find(x=>x.id===batchId);
  if(!batch) return false;
  autoBackupBefore('قبل حذف دفعة استيراد '+batch.id);
  saveT(DB.broadcast, loadT(DB.broadcast).filter(x=>!(batch.recordIds||[]).includes(x.id)));
  saveT(DB.imports, batches.filter(x=>x.id!==batch.id));
  logAudit('حذف دفعة استيراد مذيعين', {batchId:batch.id, recordsRemoved:(batch.recordIds||[]).length, month:batch.month});
  return true;
}
function deleteLastImport(){
  const batch = loadT(DB.imports).sort((a,b)=>String(b.ts||'').localeCompare(String(a.ts||'')))[0];
  if(!batch){ alert('لا توجد دفعات استيراد لحذفها.'); return; }
  if(!confirm(`سيتم حذف آخر استيراد فقط:\n${batch.month||''} — ${batch.fileName||''}\nعدد السجلات: ${(batch.recordIds||[]).length}\n\nالمتجر لن يتأثر. متابعة؟`)) return;
  deleteImportBatch(batch.id);
  alert('تم حذف آخر استيراد بنجاح.');
  render();
}
function monthStoreSummary(month){
  const store = getStoreSeries().filter(e=>e.date && e.date.slice(0,7)===month);
  const sales = store.reduce((a,e)=>a+num(e.salesIncl),0);
  const cogs = store.reduce((a,e)=>a+num(e.cogs),0);
  const exp = store.reduce((a,e)=>a+storeExpenses(e),0);
  const net = store.reduce((a,e)=>a+e.netProfit,0);
  return {rows:store.length, sales,cogs,exp,net, margin:sales?net/sales:0};
}
function monthBroadcasterSummary(month){
  const rows = loadT(DB.broadcast).filter(b=>b.month===month).map(computeBroadcaster);
  const canonicalCount = new Set(rows.map(r=>canonicalBroadcaster(r).key)).size;
  return {
    rows:rows.length, broadcasters:canonicalCount,
    salaryUSD:rows.reduce((a,r)=>a+r.salaryUSD,0), commissionUSD:rows.reduce((a,r)=>a+r.commissionUSD,0), totalUSD:rows.reduce((a,r)=>a+r.totalUSD,0),
    salarySAR:rows.reduce((a,r)=>a+r.salarySAR,0), commissionSAR:rows.reduce((a,r)=>a+r.commissionSAR,0), totalSAR:rows.reduce((a,r)=>a+r.totalSAR,0)
  };
}
function whatsappMonthlyText(month){
  const s=monthStoreSummary(month), b=monthBroadcasterSummary(month);
  const rows=loadT(DB.broadcast).filter(r=>r.month===month).map(computeBroadcaster);
  const best=rows.length ? rows.slice().sort((a,b)=>b.commissionUSD-a.commissionUSD)[0] : null;
  return `تقرير DOT ALMASIAH — ${month}\n\n`+
    `المتجر:\n`+
    `المبيعات: ${sar(s.sales)} SAR\n`+
    `صافي ربح المتجر: ${sar(s.net)} SAR\n`+
    `هامش الربح: ${pct(s.margin)}\n\n`+
    `وكالة المذيعين:\n`+
    `عدد المذيعين: ${b.broadcasters}\n`+
    `رواتب المذيعين: $${sar(b.salaryUSD)} / ${sar(b.salarySAR)} SAR\n`+
    `عمولة الوكالة: $${sar(b.commissionUSD)} / ${sar(b.commissionSAR)} SAR\n`+

/* =========================================================
   Period filtering helpers
   ========================================================= */
function dateInRange(dateStr, from, to){
  if(!dateStr) return false;
  const d = new Date(dateStr);
  if(from && d < new Date(from)) return false;
  if(to && d > new Date(to+'T23:59:59')) return false;
  return true;
}
function monthInRange(monthStr, from, to){
  // monthStr format YYYY-MM
  if(!monthStr) return false;
  const d = new Date(monthStr+'-01');
  if(from){ const f=new Date(from.slice(0,7)+'-01'); if(d<f) return false; }
  if(to){ const t=new Date(to.slice(0,7)+'-01'); if(d>t) return false; }
  return true;
}
function computePeriodRange(){
  const p = app.period;
  const today = new Date();
  if(p.mode==='custom') return {from:p.from, to:p.to};
  if(p.mode==='daily'){
    const d = p.from || today.toISOString().slice(0,10);
    return {from:d, to:d};
  }
  if(p.mode==='yearly'){
    const y = p.from || String(today.getFullYear());
    return {from:y+'-01-01', to:y+'-12-31'};
  }
  // monthly default
  const m = p.from || today.toISOString().slice(0,7);
  const [yy,mm] = m.split('-').map(Number);
  const last = new Date(yy, mm, 0).getDate();
  return {from:`${m}-01`, to:`${m}-${String(last).padStart(2,'0')}`};
}

function periodFilterBar(){
  const p = app.period;
  return `
  <div class="filterbar panel" style="padding:16px 18px;">
    <div class="field">
      <label>نوع الفترة</label>
      <select id="pf-mode">
        <option value="daily" ${p.mode==='daily'?'selected':''}>يومي</option>
        <option value="monthly" ${p.mode==='monthly'?'selected':''}>شهري</option>
        <option value="yearly" ${p.mode==='yearly'?'selected':''}>سنوي</option>
        <option value="custom" ${p.mode==='custom'?'selected':''}>مخصص</option>
      </select>
    </div>
    ${p.mode==='daily'?`<div class="field"><label>اليوم</label><input type="date" id="pf-day" value="${p.from||''}"></div>`:''}
    ${p.mode==='monthly'?`<div class="field"><label>الشهر</label><input type="month" id="pf-month" value="${p.from||''}"></div>`:''}
    ${p.mode==='yearly'?`<div class="field"><label>السنة</label><input type="number" id="pf-year" value="${p.from||new Date().getFullYear()}" style="width:110px;"></div>`:''}
    ${p.mode==='custom'?`

      <div class="field"><label>إلى</label><input type="date" id="pf-to" value="${p.to||''}"></div>
    `:''}
    <div class="field"><button class="btn primary sm" id="pf-apply">تطبيق</button></div>

        <div class="switch ${app.showComprehensive?'on':''}" id="toggle-comprehensive"><div class="dot"></div></div>
      </div>
    </div>
  </div>`;
}
function bindPeriodBar(onApply){
  const modeSel = document.getElementById('pf-mode');
  modeSel.addEventListener('change', ()=>{ app.period.mode = modeSel.value; app.period.from=null; app.period.to=null; render(); });
  const applyBtn = document.getElementById('pf-apply');
  applyBtn.addEventListener('click', ()=>{
    const mode = app.period.mode;
    if(mode==='daily') app.period.from = document.getElementById('pf-day').value;
    if(mode==='monthly') app.period.from = document.getElementById('pf-month').value;
    if(mode==='yearly') app.period.from = document.getElementById('pf-year').value;
    if(mode==='custom'){ app.period.from = document.getElementById('pf-from').value; app.period.to = document.getElementById('pf-to').value; }
    onApply && onApply();
    render();
  });
  document.getElementById('toggle-comprehensive').addEventListener('click', ()=>{
    app.showComprehensive = !app.showComprehensive; render();
  });
}

function renderMonthlyChart(container){
  const series = getStoreSeries();
  const byMonth = {};
  series.forEach(e=>{
    if(!e.date) return;
    const m = e.date.slice(0,7);
    byMonth[m] = (byMonth[m]||0) + e.netProfit;
  });
  const months = Object.keys(byMonth).sort().slice(-12);
  if(months.length===0){ container.innerHTML = '<div class="empty">لا توجد بيانات كافية لعرض الرسم البياني</div>'; return; }
  const max = Math.max(...months.map(m=>Math.abs(byMonth[m])), 1);
  container.innerHTML = `<div class="chart">${months.map(m=>{
    const v = byMonth[m];
    const h = Math.max(4, Math.round(Math.abs(v)/max*130));
    return `<div class="bar-col"><div style="font-size:10px;color:var(--text-dim);">${sar(v)}</div><div class="bar ${v<0?'neg':''}" style="height:${h}px;"></div><div class="lbl">${m}</div></div>`;
  }).join('')}</div>`;
}

    if(isMonthLocked(data.date.slice(0,7))){ alert('هذا الشهر مغلق. فك الإغلاق أولًا قبل تعديل سجلات المتجر.'); return; }
    const list2 = loadT(DB.store);
    const idx = list2.findIndex(x=>x.id===data.id);
    if(idx>=0) list2[idx]=data; else list2.push(data);
    saveT(DB.store, list2);
    logAudit(id?'تعديل سجل متجر':'إضافة سجل متجر', {recordId:data.id, date:data.date});
    closeModal(); render();
  });
}

function deleteStoreEntry(id){
  const rec = loadT(DB.store).find(x=>x.id===id);
  if(rec && isMonthLocked(String(rec.date||'').slice(0,7))){ alert('هذا الشهر مغلق. فك الإغلاق أولًا قبل حذف سجلات المتجر.'); return; }
  if(!confirm('حذف هذا السجل نهائيًا من سجلات المتجر؟')) return;
  const list = loadT(DB.store).filter(x=>x.id!==id);
  saveT(DB.store, list);
  logAudit('حذف سجل متجر', {recordId:id});
  render();
}

function exportStoreCSV(rows){
  const headers = ['التاريخ','الماسات المباعة','المبيعات','الماسات المشتراة','المشتريات','تكلفة الماس المباع','رسوم سلة','رسوم البوابة','إعلانات','تحويلات','مصروفات تشغيل','مصروفات أخرى','ضريبة المصروفات','مصدر الدفع','صافي الربح','ملاحظات'];
  const lines = [headers.join(',')];
  rows.forEach(e=>{
    lines.push([e.date, e.diamondsSold, e.salesIncl, e.diamondsPurchased, e.purchasesIncl, e.cogs, e.sallaFees, e.gatewayFees, e.ads, e.transfers, e.opExpenses, e.otherExpenses, paymentSourceLabel(e.paymentSource), e.netProfit, '"'+(e.notes||'').replace(/"/g,'""')+'"'].join(','));
  });
  downloadFile('store_entries.csv', '\ufeff'+lines.join('\n'), 'text/csv;charset=utf-8');
}

function downloadFile(filename, content, mime){
  const blob = new Blob([content], {type:mime||'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

  const settings = loadSettings();
  const calcRows = all.map(r=>{ const c=computeBroadcaster(r); c._canonical=canonicalBroadcaster(c); return c; });
  const totalSalaryUSD = calcRows.reduce((a,b)=>a+b.salaryUSD,0);
  const totalCommissionUSD = calcRows.reduce((a,b)=>a+b.commissionUSD,0);
  const totalUSD = calcRows.reduce((a,b)=>a+b.totalUSD,0);
  const totalSalarySAR = calcRows.reduce((a,b)=>a+b.salarySAR,0);
  const totalCommissionSAR = calcRows.reduce((a,b)=>a+b.commissionSAR,0);
  const totalSAR = calcRows.reduce((a,b)=>a+b.totalSAR,0);
  const moneySAR = n => `${sar(n)} ر.س`;
  const moneyUSD = n => `$${sar(n)}`;

  const byMonth = groupBy(calcRows, b=>b.month||'—');
  const monthRows = Object.keys(byMonth).sort().reverse().map(m=>{
    const rows=byMonth[m];
    return {month:m, rows:rows.length, broadcasters:new Set(rows.map(r=>r._canonical.key)).size,
      salaryUSD:rows.reduce((a,r)=>a+r.salaryUSD,0), commissionUSD:rows.reduce((a,r)=>a+r.commissionUSD,0), totalUSD:rows.reduce((a,r)=>a+r.totalUSD,0),

  });

  const byYear = groupBy(calcRows, b=>(b.month||'—').slice(0,4));

  });

  function buildBroadcasterRanking(rows){
    const byCanonical = groupBy(rows, b=>b._canonical.key);
    return Object.keys(byCanonical).map(key=>{
      const subRows=byCanonical[key];
      const info = subRows[0]._canonical;
      const ids=[...new Set(subRows.map(r=>r.bigoId || r.uid).filter(Boolean))].join(' / ');
      const bestByAgency = subRows.slice().sort((a,b)=>b.commissionSAR-a.commissionSAR)[0];

      return {key, name:info.name, bigoId:ids||info.ids, rows:subRows.length, months:new Set(subRows.map(r=>r.month)).size,
        bestMonth:(bestByAgency?.month || ''), bestSalaryMonth:(bestBySalary?.month || ''), bestTotalMonth:(bestByTotal?.month || ''),

  const rankRows = buildBroadcasterRanking(calcRows).sort((a,b)=>b.commissionSAR-a.commissionSAR);

  `,'<button class="btn" id="close-alias">إغلاق</button>');
  document.getElementById('close-alias').addEventListener('click', closeModal);

    const name=document.getElementById('alias-name').value.trim();

    saveAliases(list); logAudit('حذف دمج آيديات مذيع', {aliasId:btn.dataset.id}); closeModal(); render();
  }));
}

  {key:'totalSAR', label:'الإجمالي بالريال (راتب + وكالة)', required:false},
];

function normHeader(h){
  return String(h||'').trim().toLowerCase().replace(/\s+/g,' ').replace(/[ـ]/g,'');
}
function guessMapping(headers){
  const m = {};
  const hs = headers.map(h=>({raw:h, n:normHeader(h)}));
  function find(pred){ const x=hs.find(pred); return x?x.raw:''; }
  m.month = find(x=>/(^|\s)(month|الشهر|الفترة|period)(\s|$)/i.test(x.n));
  m.broadcasterName = find(x=>/اسم المذيع|المذيع|name|broadcaster/.test(x.n));
  m.uid = find(x=>/^uid$|يو اي دي|الرقم الداخلي/.test(x.n));
  m.bigoId = find(x=>/(bigo|الايدي|الآيدي|id)/.test(x.n) && !/^uid$/.test(x.n) && !/مستلم|مستقطب|serial|تسلسل|الرقم التسلسلي/.test(x.n));
  m.salaryUSD = find(x=>/(راتب|عمولة المذيع|المذيع).*\$|salary.*usd|host.*commission|عمولة المذيع بالدولار/.test(x.n));
  m.commissionUSD = find(x=>/(عمولة الوكالة|أرباح الوكالة|ارباح الوكالة).*\$|agency.*commission|commissionusd|عمولة الوكالة بالدولار/.test(x.n));
  m.totalUSD = find(x=>/(الإجمالي|الاجمالي|total|received).*\$|العمولة النهائية|عمولة المذيع \+ عمولة الوكالة/.test(x.n));
  m.salarySAR = find(x=>/(راتب|عمولة المذيع|المذيع).*(ريال|sar)|^راتب$/.test(x.n));
  m.commissionSAR = find(x=>/(عمولة الوكالة|أرباح الوكالة|ارباح الوكالة).*(ريال|sar)|^عمولة$/.test(x.n));
  m.totalSAR = find(x=>/(الإجمالي|الاجمالي|total).*(ريال|sar)|^الإجمالي$|^الاجمالي$/.test(x.n));
  return m;
}

function handleImportFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const month = document.getElementById('imp-month').value;
  const rate = num(document.getElementById('imp-rate').value) || loadSettings().defaultExchangeRate;
  const reader = new FileReader();
  if(/\.json$/i.test(file.name)){ alert('هذا ملف JSON للنسخ الاحتياطي، وليس ملف رواتب مذيعين. استورده من قسم النسخ الاحتياطي.'); e.target.value=''; return; }
  const isCSV = /\.csv$/i.test(file.name);
  reader.onload = function(ev){
    let headers=[], rows=[];
    if(isCSV){
      const text = ev.target.result;
      const parsed = parseCSV(text);
      headers = parsed.headers; rows = parsed.rows;
    } else {
      if(typeof XLSX === 'undefined'){ alert('تعذر قراءة Excel لأن مكتبة XLSX لم تُحمّل. احفظ الملف بصيغة CSV ثم أعد الاستيراد، أو افتح البرنامج مع اتصال إنترنت مرة واحدة.'); return; }
      const wb = XLSX.read(ev.target.result, {type:'binary'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
      headers = (json[0]||[]).map(h=>String(h));
      rows = json.slice(1).filter(r=>r.some(c=>String(c).trim()!=='')).map(r=>{
        const o = {}; headers.forEach((h,i)=>o[h]=r[i]!==undefined?r[i]:''); return o;
      });
    }
    const legacyCheck = looksLikeLegacyBroadcasterProfitFile(headers, rows);
    if(legacyCheck.isLegacy || isBackupLikeFile(headers, rows)){
      alert(`هذا الملف ليس ملف رواتب مذيعين صالح للاستيراد.\n\nتم اكتشاف سجلات قديمة مثل royal_broadcaster_profit أو أعمدة باك أب/أرباح قديمة.\n\nاستخدم هنا فقط ملف الرواتب المفصل الذي يحتوي على: salaryUSD و commissionUSD و totalUSD.\n\nإذا كنت تريد استيراد نسخة JSON فاذهب إلى قسم: النسخ الاحتياطي.`);
      e.target.value = '';
      return;
    }
    app.importState = { step:1, month, rate, headers, rawRows:rows, mapping:guessMapping(headers), fileName:file.name, excludedLegacy: legacyCheck };
    render();
  };
  if(isCSV) reader.readAsText(file, 'UTF-8'); else reader.readAsBinaryString(file);
}

function parseCSV(text){
  text = text.replace(/^\uFEFF/, '');
  const lines = text.split(/\r\n|\n/).filter(l=>l.trim()!=='');
  const parseLine = (line)=>{
    const out=[]; let cur=''; let inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){ if(inQ && line[i+1]==='"'){ cur+='"'; i++; } else { inQ=!inQ; } }
      else if(c===',' && !inQ){ out.push(cur); cur=''; }
      else cur+=c;
    }
    out.push(cur); return out;
  };
  const first = lines[0] || '';
  const commaCount = (first.match(/,/g)||[]).length;
  const semiCount = (first.match(/;/g)||[]).length;
  const delimiter = semiCount > commaCount ? ';' : ',';
  const parseWithDelimiter = (line)=>{
    const out=[]; let cur=''; let inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){ if(inQ && line[i+1]==='"'){ cur+='"'; i++; } else { inQ=!inQ; } }
      else if(c===delimiter && !inQ){ out.push(cur); cur=''; }
      else cur+=c;
    }
    out.push(cur); return out;
  };
  const headers = parseWithDelimiter(lines[0]);
  const rows = lines.slice(1).map(l=>{
    const cells = parseWithDelimiter(l); const o={}; headers.forEach((h,i)=>o[h]=cells[i]!==undefined?cells[i]:''); return o;
  });
  return {headers, rows};
}

function normalizeCellText(v){
  return String(v===undefined || v===null ? '' : v).trim().toLowerCase();
}
function isLegacyBroadcasterProfitRow(row){
  const keys = Object.keys(row||{}).map(normalizeCellText);
  const vals = Object.values(row||{}).map(normalizeCellText);
  const joined = vals.join(' | ');
  if(joined.includes('royal_broadcaster_profit')) return true;
  if(keys.some(k=>k === 'broadcasterprofit' || k === 'broadcaster_profit' || k === 'broadcaster profit') && vals.some(v=>v.includes('عمولة وكالة المذيعين'))) return true;
  if(keys.includes('date') && keys.includes('id') && keys.some(k=>k.includes('broadcasterprofit'))) return true;
  return false;
}
function looksLikeLegacyBroadcasterProfitFile(headers, rows){
  const hs = (headers||[]).map(normHeader);
  const hasLegacyHeaders = hs.includes('id') && hs.some(h=>h==='broadcasterprofit' || h==='broadcaster_profit' || h.includes('broadcasterprofit'));
  const legacyCount = (rows||[]).filter(isLegacyBroadcasterProfitRow).length;
  return { hasLegacyHeaders, legacyCount, isLegacy: hasLegacyHeaders || legacyCount > 0 };
}
function isBackupLikeFile(headers, rows){
  const hs = (headers||[]).map(normHeader);
  const backupHeaders = ['solddiamonds','salesinc','purchaseddiamonds','purchasesinc','expsalla','exppayment','broadcasterprofit'];
  const hits = backupHeaders.filter(h=>hs.includes(h)).length;
  return hits >= 2;
}

function processImportRows(){
  const st = app.importState;
  const existing = loadT(DB.broadcast);
  st.excludedLegacyRows = 0;
  st.processed = st.rawRows.map((row, idx)=>{
    if(isLegacyBroadcasterProfitRow(row)){
      st.excludedLegacyRows++;
      return null;
    }
    const get = (key)=> st.mapping[key] ? row[st.mapping[key]] : '';
    const rawMonth = String(get('month')||'').trim();
    const rowMonth = /^\d{4}-\d{2}/.test(rawMonth) ? rawMonth.slice(0,7) : st.month;
    const rawName = String(get('broadcasterName')||'').trim();
    const bigoId = String(get('bigoId')||'').trim();
    const uid = String(get('uid')||'').trim();
    const name = rawName && rawName !== '-' ? rawName : (bigoId || uid || ('مذيع '+(idx+1)));

    const rate = num(st.rate) || 3.75;
    const salaryUSDVal = num(get('salaryUSD'));
    const salarySARVal = num(get('salarySAR'));
    const commissionUSDVal = num(get('commissionUSD'));
    const commissionSARVal = num(get('commissionSAR'));
    const totalUSDVal = num(get('totalUSD'));
    const totalSARVal = num(get('totalSAR'));

    const hasSalaryUSD = st.mapping.salaryUSD && String(get('salaryUSD')).trim()!=='';
    const hasSalarySAR = st.mapping.salarySAR && String(get('salarySAR')).trim()!=='';
    const hasCommissionUSD = st.mapping.commissionUSD && String(get('commissionUSD')).trim()!=='';
    const hasCommissionSAR = st.mapping.commissionSAR && String(get('commissionSAR')).trim()!=='';
    const hasTotalUSD = st.mapping.totalUSD && String(get('totalUSD')).trim()!=='';
    const hasTotalSAR = st.mapping.totalSAR && String(get('totalSAR')).trim()!=='';

    const salaryUSD = hasSalaryUSD ? salaryUSDVal : (hasSalarySAR ? round2(salarySARVal/rate) : 0);
    let commissionUSD = hasCommissionUSD ? commissionUSDVal : (hasCommissionSAR ? round2(commissionSARVal/rate) : 0);
    const totalUSDFromFile = hasTotalUSD ? totalUSDVal : (hasTotalSAR ? round2(totalSARVal/rate) : 0);
    if(!hasCommissionUSD && !hasCommissionSAR && (hasTotalUSD || hasTotalSAR)){
      commissionUSD = round2(totalUSDFromFile - salaryUSD);
    }
    if(Math.abs(commissionUSD) < 0.005) commissionUSD = 0;
    if(commissionUSD < 0) commissionUSD = 0;
    const computedTotal = round2(salaryUSD + commissionUSD);
    const hasTotal = hasTotalUSD || hasTotalSAR;
    const mismatch = hasTotal && Math.abs(round2(totalUSDFromFile) - computedTotal) > 0.05;

    const dup = existing.find(x=> x.month===rowMonth && (
      (bigoId && String(x.bigoId)===bigoId) ||
      (uid && String(x.uid)===uid) ||
      ((x.broadcasterName||'').trim() && rawName && (x.broadcasterName||'').trim()===rawName)
    ));
    const errors = [];
    if(!rawName && !bigoId && !uid) errors.push('لا يوجد اسم أو BIGO ID أو UID');
    if(isMonthLocked(rowMonth)) errors.push('الشهر مغلق ولا يقبل الاستيراد');
    if(!(hasSalaryUSD || hasSalarySAR)) errors.push('راتب المذيع مفقود');
    if(!(hasCommissionUSD || hasCommissionSAR || hasTotalUSD || hasTotalSAR)) errors.push('عمولة الوكالة أو الإجمالي مطلوب');
    if(mismatch) errors.push(`الإجمالي (${sar(totalUSDFromFile)}) لا يساوي راتب+عمولة (${sar(computedTotal)})`);
    return {
      rowIndex: idx, month: rowMonth, name, bigoId, uid, salaryUSD, commissionUSD,
      totalUSDRaw: hasTotal ? totalUSDFromFile : computedTotal,
      computedTotal, mismatch, errors, isDuplicate: !!dup, duplicateOf: dup?dup.id:null,
      resolution: dup ? 'skip' : 'create', useComputedTotal: mismatch || !hasTotal
    };
  }).filter(r=> r && Math.abs(r.salaryUSD)+Math.abs(r.commissionUSD)+Math.abs(r.totalUSDRaw) > 0);
}

  main.innerHTML = `

function commitImport(){
  const st = app.importState;
  if(!st || !st.processed || !st.processed.length){ alert('لا توجد سجلات رواتب صالحة للاعتماد. اختر ملف الرواتب الصحيح.'); return; }
  const blocking = st.processed.filter(r=> r.errors.some(e=>!e.startsWith('الإجمالي')) );
  if(blocking.length){
    if(!confirm(`يوجد ${blocking.length} صف به أخطاء غير قابلة للاعتماد وسيتم استبعادها تلقائيًا. هل تريد المتابعة؟`)) return;
  }
  takeSnapshot('قبل استيراد رواتب مذيعين - '+st.month);

  const list = loadT(DB.broadcast);
  let added=0, updated=0, skipped=0;
  const batchRecordIds = [];
  const rate = st.rate;

  st.processed.forEach(r=>{
    if(r.errors.some(e=>!e.startsWith('الإجمالي'))){ skipped++; return; }
    const totalUSD = r.useComputedTotal ? r.computedTotal : r.totalUSDRaw;
    const commissionUSD = r.useComputedTotal ? r.commissionUSD : round2(totalUSD - r.salaryUSD);
    const base = {
      month: r.month || st.month, broadcasterName:r.name, bigoId:r.bigoId, uid:r.uid,
      salaryUSD:r.salaryUSD, commissionUSD: commissionUSD, exchangeRate:rate,
      status:'imported', notes:'مستورد من ملف', updatedAt: nowISO()
    };
    if(r.isDuplicate){
      if(r.resolution==='skip'){ skipped++; return; }
      if(r.resolution==='update'){
        const idx = list.findIndex(x=>x.id===r.duplicateOf);
        if(idx>=0){ list[idx] = {...list[idx], ...base}; batchRecordIds.push(list[idx].id); updated++; }
        return;
      }
      // copy -> fall through to create new
    }
    const id = genId('bc');
    list.push({id, ...base});
    batchRecordIds.push(id);
    added++;
  });
  saveT(DB.broadcast, list);

  const batch = {
    id: genId('imp'), ts: nowISO(), month: st.month, fileName: st.fileName,
    recordIds: batchRecordIds, added, updated, skipped,
    totalSalaryUSD: st.processed.reduce((a,r)=>a+r.salaryUSD,0),
    totalCommissionUSD: st.processed.reduce((a,r)=>a+r.commissionUSD,0),
    totalUSD: st.processed.reduce((a,r)=>a+(r.useComputedTotal?r.computedTotal:r.totalUSDRaw),0)
  };
  const batches = loadT(DB.imports);
  batches.unshift(batch);
  saveT(DB.imports, batches);

  logAudit('استيراد رواتب مذيعين', {
    batchId: batch.id, month: st.month, added, updated, skipped,
    totalSalary: st.processed.reduce((a,r)=>a+r.salaryUSD,0),
    totalCommission: st.processed.reduce((a,r)=>a+r.commissionUSD,0)
  });

  app.importState = null;
  alert(`تم الاستيراد: ${added} سجل جديد، ${updated} تحديث، ${skipped} مستبعد.`);
  app.view = 'broadcasters';
  render();
}

/* =========================================================
   INTEGRITY MODULE
   ========================================================= */
function renderIntegrity(main){
  const store = loadT(DB.store);
  const bc = loadT(DB.broadcast);

  const issues = [];

  // 1. duplicate store entries (same date + same sales + same purchases)
  const seenStore = {};
  store.forEach(e=>{
    const key = `${e.date}|${e.salesIncl}|${e.purchasesIncl}`;
    seenStore[key] = seenStore[key]||[]; seenStore[key].push(e);
  });
  Object.values(seenStore).filter(g=>g.length>1).forEach(g=>{
    issues.push({type:'تكرار محتمل في المتجر', detail:`${g.length} سجلات بنفس التاريخ (${g[0].date}) ونفس القيم`, ids:g.map(x=>x.id), fixable:false});
  });

  // 2. duplicate broadcaster records same month+name/bigoId
  const seenBc = {};
  bc.forEach(b=>{
    const key = `${b.month}|${(b.broadcasterName||'').trim().toLowerCase()}`;
    seenBc[key]=seenBc[key]||[]; seenBc[key].push(b);
  });
  Object.values(seenBc).filter(g=>g.length>1).forEach(g=>{
    issues.push({type:'تكرار مذيع في نفس الشهر', detail:`${g[0].broadcasterName} - ${g[0].month} (${g.length} سجلات)`, ids:g.map(x=>x.id), fixable:false});
  });

  // 3. unusual numbers in store (negative net far off, expenses > sales*3, etc.)
  store.forEach(e=>{
    if(num(e.salesIncl) < 0 || num(e.purchasesIncl) < 0){
      issues.push({type:'قيمة سالبة غير منطقية', detail:`سجل ${e.date}: قيمة سالبة في المبيعات أو المشتريات`, ids:[e.id], fixable:false});
    }
    if(num(e.salesIncl)>0 && storeExpenses(e) > num(e.salesIncl)*3){
      issues.push({type:'مصروفات غير منطقية', detail:`سجل ${e.date}: مصروفات أعلى بكثير من المبيعات`, ids:[e.id], fixable:false});
    }
  });

  // 4. totalUSD mismatch for broadcasters
  bc.forEach(b=>{
    const computedTotal = round2(num(b.salaryUSD)+num(b.commissionUSD));
    if(b._storedTotal!==undefined && Math.abs(b._storedTotal - computedTotal) > 0.01){
      issues.push({type:'فرق في الإجمالي', detail:`${b.broadcasterName} - ${b.month}`, ids:[b.id], fixable:true, fixId:b.id});
    }
  });

  // 5. cross-contamination heuristic: store notes mentioning broadcaster terms
  store.forEach(e=>{
    const txt = (e.notes||'')+'';
    if(/بيقو|bigo|مذيع|عمولة الوكالة/i.test(txt)){
      issues.push({type:'احتمال تداخل بيانات', detail:`سجل متجر بتاريخ ${e.date} يحتوي إشارة لبيانات مذيعين في الملاحظات`, ids:[e.id], fixable:false});
    }
  });

  main.innerHTML = `
    <div class="page-head">
      <div><h2>فحص سلامة البيانات</h2><div class="sub">أدوات تدقيق لضمان فصل البيانات بين مسار المتجر ومسار وكالة المذيعين</div></div>
      <button class="btn primary" id="run-scan">إعادة الفحص</button>
    </div>
    <div class="cards">
      <div class="card ${issues.length?'accent':''}"><div class="label">عدد الملاحظات المكتشفة</div><div class="value ${issues.length?'neg':'pos'}">${ar(issues.length)}</div></div>
      <div class="card"><div class="label">سجلات المتجر</div><div class="value">${ar(store.length)}</div></div>
      <div class="card"><div class="label">سجلات المذيعين</div><div class="value">${ar(bc.length)}</div></div>
    </div>
    <div class="panel">
      <h3>نتائج الفحص</h3>
      ${issues.length===0? `<div class="alert ok">لم يتم العثور على أي مشاكل — البيانات سليمة ومفصولة بشكل صحيح.</div>` :
        `<div class="table-wrap"><table>
          <thead><tr><th>نوع الملاحظة</th><th>التفاصيل</th><th></th></tr></thead>
          <tbody>${issues.map((iss,i)=>`
            <tr><td><span class="tag err">${iss.type}</span></td><td>${iss.detail}</td>
            <td>${iss.fixable? `<button class="btn sm auto-fix" data-idx="${i}">إصلاح تلقائي</button>`:'<span class="small">مراجعة يدوية</span>'}</td></tr>`).join('')}
          </tbody>
        </table></div>`}
    </div>
  `;
  document.getElementById('run-scan').addEventListener('click', render.bind(null), false);
  document.getElementById('run-scan').addEventListener('click', ()=>renderIntegrity(main));
  main.querySelectorAll('.auto-fix').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const iss = issues[btn.dataset.idx];
      openModal('معاينة الإصلاح التلقائي', `<p class="small">سيتم إعادة حساب الإجمالي بناءً على راتب المذيع + عمولة الوكالة للسجل المحدد.</p>`, `
        <button class="btn" id="cancel-fix">إلغاء</button>
        <button class="btn primary" id="apply-fix">تطبيق الإصلاح</button>`);
      document.getElementById('cancel-fix').addEventListener('click', closeModal);
      document.getElementById('apply-fix').addEventListener('click', ()=>{
        takeSnapshot('قبل إصلاح تلقائي لسلامة البيانات');
        logAudit('إصلاح تلقائي', {recordId: iss.fixId});
        closeModal(); renderIntegrity(document.getElementById('main'));
      });
    });
  });
}

/* =========================================================
   LEGACY BACKUP MIGRATION
   Handles backups from the older combined tool (schema: {entries:[...]})
   where store, broadcaster and shipping profits were mixed into one record.
   ========================================================= */
function legacyPaymentSource(e){
  const options = [['bank',num(e.payBank)],['mada',num(e.payMada)],['applepay',num(e.payApple)],['stcpay',num(e.payStc)],['other',num(e.payOther)]];
  options.sort((a,b)=>b[1]-a[1]);
  return options[0][1] > 0 ? options[0][0] : 'other';
}

function migrateLegacyPayload(payload){
  const rate = loadSettings().defaultExchangeRate || 3.75;
  const store = [], broadcast = [];
  let bcCount = 0, shipMergedCount = 0, excludedBcProfit = 0;
  const excludedBcByMonth = {};

  (payload.entries||[]).forEach(e=>{
    const legacyBc = num(e.broadcasterProfit);
    if(legacyBc !== 0){
      bcCount++;
      excludedBcProfit = round2(excludedBcProfit + legacyBc);
      const m = (e.date||'').slice(0,7) || 'غير محدد';
      excludedBcByMonth[m] = round2((excludedBcByMonth[m]||0) + legacyBc);
    }

    const hasStoreMovement = ['soldDiamonds','salesInc','purchasedDiamonds','purchasesInc','expSalla','expPayment','expAds','expTransfer','expOperating','expOther','payBank','payMada','payApple','payStc','payOther'].some(k=>num(e[k])!==0);
    if(!hasStoreMovement) return; // سجلات royal_broadcaster_profit القديمة تُستبعد من المتجر ومن المذيعين

    let notes = (e.notes||'') + (e.entryKind ? ' ['+e.entryKind+']' : '');
    if(num(e.shippingProfit) !== 0){
      shipMergedCount++;
      notes += ` (يتضمن مبلغ شحن/إضافي من النظام السابق: ${num(e.shippingProfit)} ر.س — دُمج ضمن ملاحظات السجل فقط)`;
    }
    if(legacyBc !== 0){
      notes += ` (تنبيه: كان هذا السجل يحتوي broadcasterProfit=${legacyBc} وتم استبعاده من الحساب لمنع تكرار أرباح وكالة المذيعين)`;
    }
    store.push({
      id: e.id || genId('store'),
      date: e.date,
      diamondsSold: num(e.soldDiamonds),
      salesIncl: num(e.salesInc),
      diamondsPurchased: num(e.purchasedDiamonds),
      purchasesIncl: num(e.purchasesInc),
      sallaFees: num(e.expSalla),
      gatewayFees: num(e.expPayment),
      ads: num(e.expAds),
      transfers: num(e.expTransfer),
      opExpenses: num(e.expOperating),
      otherExpenses: num(e.expOther),
      expenseVatMode: e.expenseVatMode || 'deductible',
      paymentSource: legacyPaymentSource(e),
      notes: notes,
      updatedAt: e.updatedAt || e.createdAt || nowISO()
    });
  });

  const settings = {
    taxRate: (payload.settings && payload.settings.vatRate!==undefined) ? num(payload.settings.vatRate)/100 : loadSettings().taxRate,
    defaultExchangeRate: rate,
    openingBalance: (payload.settings && payload.settings.openingCash!==undefined) ? num(payload.settings.openingCash) : loadSettings().openingBalance,
    openingDiamonds: (payload.settings && payload.settings.openingDiamonds!==undefined) ? num(payload.settings.openingDiamonds) : loadSettings().openingDiamonds,
    openingCostInc: (payload.settings && payload.settings.openingCostInc!==undefined) ? num(payload.settings.openingCostInc) : loadSettings().openingCostInc,
    monthlySalesTarget: loadSettings().monthlySalesTarget || 0,
    monthlyDiamondTarget: loadSettings().monthlyDiamondTarget || 3000000
  };

  const auditImported = (payload.auditLog||[]).map(a=>({
    id: genId('log'), ts: a.time || nowISO(), action: 'مرحّل من النظام السابق: '+(a.action||''),
    legacyId: a.id, date: a.date, details: a.details
  }));

  auditImported.unshift({
    id: genId('log'), ts: nowISO(), action:'استبعاد أرباح مذيعين قديمة من النسخة السابقة',
    count:bcCount, excludedBcProfit, note:'لم يتم إدخال broadcasterProfit القديم في وكالة المذيعين حتى لا يتكرر في الربح الشامل.',
    byMonth: JSON.stringify(excludedBcByMonth)
  });

  return {store, broadcast, settings, bcCount, shipMergedCount, auditImported, excludedBcProfit, excludedBcByMonth};
}

    const payload = { exportedAt:nowISO(), version:'v14', store:loadT(DB.store), broadcast:loadT(DB.broadcast), settings:loadSettings(), imports:loadT(DB.imports), aliases:loadAliases(), lockedMonths:loadLockedMonths() };
    downloadFile(`dot-almasiah-backup-${new Date().toISOString().slice(0,10)}.json`, JSON.stringify(payload,null,2), 'application/json');
    logAudit('تصدير نسخة JSON', {});
  });

  document.getElementById('import-json-btn').addEventListener('click', ()=>document.getElementById('import-json-file').click());
  document.getElementById('import-json-file').addEventListener('change', (e)=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      let payload;
      try{ payload = JSON.parse(ev.target.result); }
      catch(err){ alert('ملف غير صالح، تعذر قراءة JSON: '+err.message); return; }

      const isNativeFormat = Array.isArray(payload.store) || Array.isArray(payload.broadcast);
      const isLegacyFormat = Array.isArray(payload.entries);

      if(!isNativeFormat && !isLegacyFormat){
        alert('لم يتم التعرف على تنسيق هذا الملف — لم يتم تغيير أي بيانات حالية. تأكد أن الملف نسخة احتياطية صادرة من نظام DOT ALMASIAH (الحالي أو السابق).');
        return;
      }

      if(isNativeFormat){
        if(!confirm('سيتم استبدال جميع البيانات الحالية بمحتوى هذا الملف. سيتم أخذ نسخة احتياطية تلقائية أولاً. متابعة؟')) return;
        takeSnapshot('قبل استيراد نسخة JSON كاملة');
        saveT(DB.store, payload.store||[]);
        saveT(DB.broadcast, payload.broadcast||[]);
        saveSettings(payload.settings||loadSettings());
        saveT(DB.imports, payload.imports||[]);
        saveAliases(payload.aliases||[]);
        saveLockedMonths(payload.lockedMonths||[]);
        logAudit('استيراد نسخة JSON كاملة', {fileName:file.name});
        alert('تم الاستيراد بنجاح'); render();
        return;
      }

      // Legacy format: entries mixed store + broadcaster profit together.
      const migrated = migrateLegacyPayload(payload);
      openModal('ترحيل نسخة من النظام السابق', `
        <div class="alert warn">هذا الملف صادر من إصدار سابق كان يدمج بيانات المتجر مع أرباح المذيعين داخل نفس السجل. سيقوم النظام بفصلها تلقائيًا كما يلي:</div>
        <table><tbody>
          <tr><td>سجلات المتجر التي سيتم ترحيلها</td><td>${ar(migrated.store.length)}</td></tr>
          <tr><td>سجلات broadcasterProfit قديمة تم استبعادها من الحساب</td><td>${ar(migrated.bcCount)}</td></tr>
          ${migrated.shipMergedCount? `<tr><td>سجلات كانت تحتوي مبلغ "شحن" مدمج</td><td>${ar(migrated.shipMergedCount)} (تم دمجها ضمن ملاحظات سجل المتجر لأنها نفس مصدر الربح)</td></tr>`:''}
        </tbody></table>
        <p class="small mt">مهم: مبالغ broadcasterProfit القديمة لن تُضاف إلى وكالة المذيعين تلقائيًا. الهدف منع تكرار أرباح المذيعين داخل الربح الشامل. عند توفر ملف رواتب مفصل، استورده من قسم استيراد رواتب المذيعين.</p>
        <p class="small">سيتم استبدال سجلات المتجر الحالية بالكامل. أما سجلات وكالة المذيعين فلن يتم ملؤها من النسخة القديمة تلقائيًا. سيتم أخذ نسخة احتياطية تلقائية أولاً، كما سيتم نقل رصيد الماس الافتتاحي وتكلفته من الملف القديم إن وُجد.</p>
      `, `
        <button class="btn" id="cancel-migrate">إلغاء</button>
        <button class="btn primary" id="confirm-migrate">تنفيذ الترحيل</button>
      `);
      document.getElementById('cancel-migrate').addEventListener('click', closeModal);
      document.getElementById('confirm-migrate').addEventListener('click', ()=>{
        takeSnapshot('قبل ترحيل نسخة من النظام السابق');
        saveT(DB.store, migrated.store);
        saveT(DB.broadcast, loadT(DB.broadcast).concat(migrated.broadcast)); // migrated.broadcast فارغة عمدًا في نسخة الإنقاذ
        saveSettings(migrated.settings);
        saveT(DB.audit, migrated.auditImported.concat(loadT(DB.audit)).slice(0,500));
        logAudit('ترحيل نسخة من النظام السابق', {fileName:file.name, storeCount:migrated.store.length, bcExtracted:migrated.bcCount, shipMerged:migrated.shipMergedCount});
        closeModal();
        alert('تم الترحيل بنجاح. تم استبعاد أرباح المذيعين القديمة من الحساب لمنع التكرار. يمكنك استيراد رواتب المذيعين المفصلة لاحقًا.');
        render();
      });
    };
    reader.readAsText(file);
  });

  const clearBroadcastBtn = document.getElementById('clear-broadcast-only');
  if(clearBroadcastBtn) clearBroadcastBtn.addEventListener('click', ()=>{
    if(!confirm('سيتم حذف كل سجلات وكالة المذيعين في نسخة الإنقاذ فقط. المتجر لن يتأثر. متابعة؟')) return;
    takeSnapshot('قبل تصفير وكالة المذيعين');
    saveT(DB.broadcast, []);
    saveT(DB.imports, []);
    logAudit('تصفير وكالة المذيعين فقط', {});
    alert('تم تصفير وكالة المذيعين في نسخة الإنقاذ.');
    render();
  });
  const wipeBtn = document.getElementById('wipe-rescue-data');
  if(wipeBtn) wipeBtn.addEventListener('click', ()=>{
    if(!confirm('سيتم مسح بيانات نسخة الإنقاذ v7 بالكامل من هذا المتصفح. لا يمس النسخة القديمة. متابعة؟')) return;
    Object.values(DB).forEach(k=>localStorage.removeItem(k));
    alert('تم مسح بيانات نسخة الإنقاذ v7. سيتم تحديث الصفحة.');
    location.reload();
  });

  main.querySelectorAll('.restore-snap').forEach(b=>b.addEventListener('click', ()=>{
    if(!confirm('استرجاع هذه النسخة سيستبدل البيانات الحالية. متابعة؟')) return;
    restoreSnapshot(b.dataset.id); alert('تم الاسترجاع'); render();
  }));

  main.querySelectorAll('.del-batch').forEach(b=>b.addEventListener('click', ()=>{
    if(!confirm('حذف هذا الاستيراد سيؤدي لحذف كل سجلات المذيعين المرتبطة به فقط، دون التأثير على المتجر. متابعة؟')) return;
    deleteImportBatch(b.dataset.id);
    render();
  }));
}

function reportShell(title, bodyHtml){
  return `
  <div class="panel print-report" style="display:block;">
    <div class="flex between center mb no-print">
      <h3>${title}</h3>
      <button class="btn primary" onclick="window.print()">طباعة / حفظ PDF</button>
    </div>
    <div style="text-align:center;margin-bottom:14px;">
      <div style="font-family:'El Messiri',serif;font-size:20px;color:var(--gold-bright);">DOT ALMASIAH</div>
      <div class="small">${title} — تاريخ الإصدار: ${new Date().toLocaleDateString('en-GB')}</div>
    </div>
    ${bodyHtml}
  </div>`;
}

function buildReport(kind){
  const out = document.getElementById('report-output');
  const store = getStoreSeries();
  const bc = loadT(DB.broadcast);

  if(kind==='whatsapp'){
    openWhatsappReport(currentMonth());
    return;
  }

  if(kind==='monthlyStore'){
    const byMonth = groupBy(store, e=>e.date?e.date.slice(0,7):'—');
    const rowsHtml = Object.keys(byMonth).sort().reverse().map(m=>{
      const rows = byMonth[m];
      const sales = rows.reduce((a,e)=>a+num(e.salesIncl),0);
      const cogs = rows.reduce((a,e)=>a+num(e.cogs),0);
      const exp = rows.reduce((a,e)=>a+storeExpenses(e),0);
      const net = rows.reduce((a,e)=>a+e.netProfit,0);
      return `<tr><td>${m}</td><td>${sar(sales)}</td><td>${sar(cogs)}</td><td>${sar(exp)}</td><td>${sar(net)}</td><td>${sales?pct(net/sales):'—'}</td></tr>`;
    }).join('') || `<tr><td colspan="6">لا توجد بيانات</td></tr>`;
    out.innerHTML = reportShell('التقرير الشهري للمتجر', `
      <table><thead><tr><th>الشهر</th><th>المبيعات</th><th>تكلفة الماس المباع</th><th>المصروفات</th><th>صافي الربح</th><th>الهامش</th></tr></thead><tbody>${rowsHtml}</tbody></table>
      <p class="small mt">صافي الربح محسوب على تكلفة الماس المباع فقط (متوسط مرجّح)، وليس على إجمالي المشتريات في نفس الفترة.</p>
    `);
  }

  if(kind==='monthlyBc'){
    const byMonth = groupBy(bc.map(r=>{const c=computeBroadcaster(r); c._canonical=canonicalBroadcaster(c); return c;}), b=>b.month||'—');
    const rowsHtml = Object.keys(byMonth).sort().reverse().map(m=>{
      const rows = byMonth[m];
      const salary = rows.reduce((a,r)=>a+r.salaryUSD,0);
      const comm = rows.reduce((a,r)=>a+r.commissionUSD,0);
      const totalUSD = rows.reduce((a,r)=>a+r.totalUSD,0);
      const totalSAR = rows.reduce((a,r)=>a+r.totalSAR,0);
      const broadcasters = new Set(rows.map(r=>r._canonical.key)).size;
      return `<tr><td>${m}</td><td>${broadcasters}</td><td>${ar(rows.length)}</td><td>$${sar(salary)}</td><td>$${sar(comm)}</td><td>$${sar(totalUSD)}</td><td>${sar(totalSAR)}</td></tr>`;
    }).join('') || `<tr><td colspan="7">لا توجد بيانات</td></tr>`;
    out.innerHTML = reportShell('التقرير الشهري لوكالة المذيعين', `
      <table><thead><tr><th>الشهر</th><th>عدد المذيعين بعد الدمج</th><th>عدد الصفوف</th><th>إجمالي الرواتب $</th><th>إجمالي عمولة الوكالة $</th><th>الإجمالي $</th><th>الإجمالي ر.س</th></tr></thead><tbody>${rowsHtml}</tbody></table>
    `);
  }

  if(kind==='comprehensive'){
    const storeProfit = store.reduce((a,e)=>a+e.netProfit,0);
    const bcProfit = bc.reduce((a,b)=>a+computeBroadcaster(b).commissionSAR,0);
    out.innerHTML = reportShell('التقرير الشامل', `
      <table><thead><tr><th>المسار</th><th>الربح</th></tr></thead><tbody>
        <tr><td>المتجر (الماس المباع فقط)</td><td>${sar(storeProfit)}</td></tr>
        <tr><td>وكالة المذيعين (عمولة الوكالة فقط)</td><td>${sar(bcProfit)}</td></tr>
        <tr style="font-weight:700;color:var(--gold-bright);"><td>الإجمالي الشامل (عرض تجميعي)</td><td>${sar(storeProfit+bcProfit)}</td></tr>
      </tbody></table>
      <p class="small mt">ملاحظة: الربح الشامل هو مجموع عرضي فقط ولا يُخزَّن كسجل مالي مستقل، ولا تدخل أرباح وكالة المذيعين ضمن حسابات المتجر بأي شكل.</p>
    `);
  }

  if(kind==='compareMonths'){
    const months = [...new Set(store.map(e=>e.date?e.date.slice(0,7):'').concat(bc.map(x=>x.month)).filter(Boolean))].sort();
    const rowsHtml = months.map((m,i)=>{
      const sm=monthStoreSummary(m), bm=monthBroadcasterSummary(m);
      const total=sm.net+bm.commissionSAR;
      const prev=months[i-1]?monthStoreSummary(months[i-1]).net+monthBroadcasterSummary(months[i-1]).commissionSAR:null;
      const change = prev!==null && prev!==0 ? ((total-prev)/Math.abs(prev)) : null;
      return `<tr><td>${m}</td><td>${sar(sm.sales)}</td><td>${sar(sm.net)}</td><td>${sar(bm.commissionSAR)}</td><td>${sar(total)}</td><td>${change===null?'—':pct(change)}</td></tr>`;
    }).join('') || `<tr><td colspan="6">لا توجد بيانات</td></tr>`;
    out.innerHTML = reportShell('تقرير مقارنة الأشهر', `
      <table><thead><tr><th>الشهر</th><th>مبيعات المتجر</th><th>صافي ربح المتجر</th><th>عمولة الوكالة</th><th>الربح الشامل</th><th>التغير عن الشهر السابق</th></tr></thead><tbody>${rowsHtml}</tbody></table>
    `);
  }

  if(kind==='yearly'){
    const years = [...new Set(store.map(e=>e.date?e.date.slice(0,4):'').concat(bc.map(x=>x.month?x.month.slice(0,4):'')).filter(Boolean))].sort().reverse();
    const rowsHtml = years.map(y=>{
      const rows = store.filter(e=>e.date && e.date.slice(0,4)===y);
      const sales = rows.reduce((a,e)=>a+num(e.salesIncl),0);
      const net = rows.reduce((a,e)=>a+e.netProfit,0);
      const bcYear = bc.filter(b=>b.month && b.month.slice(0,4)===y).reduce((a,b)=>a+computeBroadcaster(b).commissionSAR,0);
      return `<tr><td>${y}</td><td>${sar(sales)}</td><td>${sar(net)}</td><td>${sar(bcYear)}</td><td style="font-weight:700;">${sar(net+bcYear)}</td></tr>`;
    }).join('') || `<tr><td colspan="5">لا توجد بيانات</td></tr>`;
    out.innerHTML = reportShell('التقرير السنوي', `
      <table><thead><tr><th>السنة</th><th>مبيعات المتجر</th><th>صافي ربح المتجر</th><th>أرباح المذيعين</th><th>الإجمالي الشامل</th></tr></thead><tbody>${rowsHtml}</tbody></table>
    `);
  }

  if(kind==='perBroadcaster'){
    const rowsCalc = bc.map(r=>{ const c=computeBroadcaster(r); c._canonical=canonicalBroadcaster(c); return c; });
    const byName = groupBy(rowsCalc, b=>b._canonical.key);
    const rowsHtml = Object.keys(byName).sort((a,b)=>byName[a][0]._canonical.name.localeCompare(byName[b][0]._canonical.name)).map(key=>{
      const rows = byName[key].sort((a,b)=>String(a.month).localeCompare(String(b.month)));
      const info=rows[0]._canonical;
      const totalSalary = rows.reduce((a,r)=>a+r.salaryUSD,0);
      const totalComm = rows.reduce((a,r)=>a+r.commissionUSD,0);
      const totalSAR = rows.reduce((a,r)=>a+r.totalSAR,0);
      const ids=[...new Set(rows.map(r=>r.bigoId).filter(Boolean))].join(' / ');
      return `<tr><td>${info.name}</td><td>${ids}</td><td>${new Set(rows.map(r=>r.month)).size}</td><td>${ar(rows.length)}</td><td>$${sar(totalSalary)}</td><td>$${sar(totalComm)}</td><td>${sar(totalSAR)}</td></tr>`;
    }).join('') || `<tr><td colspan="7">لا توجد بيانات</td></tr>`;
    out.innerHTML = reportShell('تقرير تفصيلي لكل مذيع', `
      <table><thead><tr><th>المذيع</th><th>BIGO IDs</th><th>عدد الأشهر</th><th>عدد الصفوف</th><th>إجمالي الرواتب $</th><th>إجمالي العمولات $</th><th>الإجمالي ر.س</th></tr></thead><tbody>${rowsHtml}</tbody></table>
    `);
  }
}

function groupBy(arr, keyFn){
  const out = {};
  arr.forEach(item=>{ const k = keyFn(item); out[k]=out[k]||[]; out[k].push(item); });
  return out;
}

function monthLabelV11(m){

function buildBroadcasterRankingV11(rows){
  const byCanonical = groupBy(rows, b=>b._canonical.key);
  return Object.keys(byCanonical).map(key=>{
    const subRows=byCanonical[key];
    const info = subRows[0]._canonical;
    const ids=[...new Set(subRows.map(r=>r.bigoId || r.uid).filter(Boolean))].join(' / ');
    const byMonth = Object.keys(groupBy(subRows, r=>r.month||'—')).map(m=>{
      const mr = subRows.filter(x=>(x.month||'—')===m);
      return {month:m, salarySAR:mr.reduce((a,r)=>a+r.salarySAR,0), commissionSAR:mr.reduce((a,r)=>a+r.commissionSAR,0), totalSAR:mr.reduce((a,r)=>a+r.totalSAR,0)};
    }).sort((a,b)=>String(a.month).localeCompare(String(b.month)));
    const bestByAgency = byMonth.slice().sort((a,b)=>b.commissionSAR-a.commissionSAR)[0];
    const bestBySalary = byMonth.slice().sort((a,b)=>b.salarySAR-a.salarySAR)[0];
    const bestByTotal = byMonth.slice().sort((a,b)=>b.totalSAR-a.totalSAR)[0];
    const latest = byMonth[byMonth.length-1];
    const previous = byMonth[byMonth.length-2];
    const trend = previous && previous.salarySAR ? (latest.salarySAR-previous.salarySAR)/Math.abs(previous.salarySAR) : null;
    return {key, name:info.name, bigoId:ids||info.ids, rows:subRows.length, months:new Set(subRows.map(r=>r.month)).size,
      bestMonth:(bestByAgency?.month || ''), bestSalaryMonth:(bestBySalary?.month || ''), bestTotalMonth:(bestByTotal?.month || ''), latestMonth:latest?.month||'', trend,
      salaryUSD:subRows.reduce((a,r)=>a+r.salaryUSD,0), commissionUSD:subRows.reduce((a,r)=>a+r.commissionUSD,0), totalUSD:subRows.reduce((a,r)=>a+r.totalUSD,0),

  });
}

      salaryUSD:rows.reduce((a,r)=>a+r.salaryUSD,0), commissionUSD:rows.reduce((a,r)=>a+r.commissionUSD,0), totalUSD:rows.reduce((a,r)=>a+r.totalUSD,0),

function selectedInsightMonthV14(){
  if(app.period && app.period.mode === 'monthly' && app.period.from) return String(app.period.from).slice(0,7);
  const months = [...new Set(loadT(DB.broadcast).map(r=>r.month).filter(Boolean))].sort();
  return months[months.length-1] || currentMonth();
}
function periodDaysInfoV14(month){
  if(!/^\d{4}-\d{2}$/.test(String(month||''))) return {days:30, elapsed:30, remaining:1};
  const [y,m] = month.split('-').map(Number);
  const days = new Date(y,m,0).getDate();
  const today = new Date();
  const current = today.getFullYear()===y && (today.getMonth()+1)===m;
  const selectedEnd = new Date(y,m,0);
  const past = selectedEnd < new Date(today.getFullYear(),today.getMonth(),today.getDate());
  const elapsed = current ? Math.min(days, today.getDate()) : (past ? days : 1);
  return {days, elapsed, remaining:Math.max(days-elapsed,1)};
}
function monthDiamondSoldV14(month){
  return getStoreSeries().filter(e=>e.date && e.date.slice(0,7)===month).reduce((a,e)=>a+num(e.diamondsSold),0);
}
function monthDiamondTargetReportV14(month){
  const target = num(loadSettings().monthlyDiamondTarget || 3000000);
  const sold = monthDiamondSoldV14(month);
  const d = periodDaysInfoV14(month);
  const expected = target * d.elapsed / d.days;
  const remaining = Math.max(target - sold,0);
  const dailyNeed = remaining / d.remaining;
  const pace = sold - expected;
  return {target,sold,expected,remaining,dailyNeed,pace,progress:target?sold/target:0,days:d.days,elapsed:d.elapsed,remainingDays:d.remaining};
}
function getBroadcasterMonthlyMapV14(key){
  const rows = getBroadcasterProfileRowsV11(key);
  const by = groupBy(rows, r=>r.month||'—');
  return Object.keys(by).sort().map(month=>{
    const rs=by[month];
    return {month, salarySAR:rs.reduce((a,r)=>a+r.salarySAR,0), commissionSAR:rs.reduce((a,r)=>a+r.commissionSAR,0), totalSAR:rs.reduce((a,r)=>a+r.totalSAR,0), rows:rs.length};
  });
}
function broadcasterStateV14(rank, pos, month){
  const history = getBroadcasterMonthlyMapV14(rank.key);
  const cur = history.find(x=>x.month===month);
  const prevs = history.filter(x=>x.month < month);
  const prev = prevs[prevs.length-1];
  const avg = prevs.length ? prevs.reduce((a,x)=>a+x.salarySAR,0)/prevs.length : 0;
  if(pos <= 3) return {cls:'star', label:'نجم'};
  if(!cur || cur.salarySAR<=0) return {cls:'stop', label:'متوقف هذا الشهر'};
  if(avg>0 && cur.salarySAR < avg*0.45) return {cls:'down', label:'انخفاض عن المتوسط'};
  if(prev && prev.salarySAR>0 && cur.salarySAR < prev.salarySAR*0.55) return {cls:'down', label:'انخفاض عن الشهر السابق'};
  if(prev && prev.salarySAR>0 && cur.salarySAR > prev.salarySAR*1.25) return {cls:'rising', label:'صاعد'};
  if(rank.months>=12) return {cls:'active', label:'ثابت ونشط'};
  return {cls:'watch', label:'يحتاج متابعة'};
}
function followUpBroadcastersV14(limit=8, month=selectedInsightMonthV14()){
  const ranking = buildBroadcasterRankingV11(allBroadcasterCalcRowsV11()).sort((a,b)=>b.salarySAR-a.salarySAR);
  return ranking.map((r,i)=>{
    const st = broadcasterStateV14(r,i+1,month);
    const ids = String(r.bigoId||'').split('/').map(x=>x.trim()).filter(Boolean);
    const reasons = [];
    if(['down','stop','watch'].includes(st.cls)) reasons.push(st.label);
    if(ids.length>1) reasons.push('لديه أكثر من ID');
    const p = profileForKey(r.key);
    if((p.tags||[]).some(t=>/متابعة|VIP|مميز|جديد/i.test(t))) reasons.push('عليه وسم إداري');
    return {...r, state:st, reasons:[...new Set(reasons)]};
  }).filter(x=>x.reasons.length).slice(0,limit);
}
