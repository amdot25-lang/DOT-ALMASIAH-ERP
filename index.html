<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="dot-build" content="27.2"><title>DOT ALMASIAH · تسجيل الدخول</title><link rel="manifest" href="./manifest.webmanifest?v=25.4"><link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=25.4"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="DOT ALMASIAH"><meta name="application-name" content="DOT ALMASIAH"><meta name="theme-color" content="#09090b"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"><style>:root{--gold:#d7b861;--line:#312d25;--muted:#9c9588}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:22px;background:radial-gradient(circle at 80% 0,rgba(215,184,97,.16),transparent 32%),#09090b;color:#f5f1e9;font-family:Tajawal}.box{width:min(430px,100%);background:linear-gradient(180deg,#19191c,#101012);border:1px solid rgba(215,184,97,.32);border-radius:25px;padding:28px;box-shadow:0 35px 95px #0009}.brand{display:flex;gap:15px;align-items:center;margin-bottom:24px}.mark{width:58px;height:58px;border:1px solid var(--gold);border-radius:14px;transform:rotate(45deg);display:grid;place-items:center;color:var(--gold);font-weight:800}.mark span{transform:rotate(-45deg)}h1{font-family:El Messiri;margin:0;font-size:23px}.brand p{margin:3px 0 0;color:var(--muted);font-size:12px}.tabs{display:grid;grid-template-columns:1fr 1fr;background:#0b0b0d;border:1px solid var(--line);padding:4px;border-radius:12px}.tabs button{border:0;background:none;color:var(--muted);padding:10px;border-radius:9px}.tabs button.active{background:#2a2519;color:#f2d47b}.field{margin:14px 0}.field label{display:block;color:var(--muted);font-size:11px;margin-bottom:6px}.field input{width:100%;padding:13px;border:1px solid #39363a;border-radius:11px;background:#0a0a0c;color:#fff;outline:none}.field input:focus{border-color:var(--gold)}.primary{width:100%;padding:13px;border:1px solid var(--gold);border-radius:11px;background:linear-gradient(180deg,var(--gold),#9c792e);font-weight:800;color:#111}.msg{min-height:25px;color:#e6b85c;font-size:12px;margin-top:11px}.hidden{display:none}</style></head><body><div class="box"><div class="brand"><div class="mark"><span>DM</span></div><div><h1>DOT ALMASIAH</h1><p>Cloud ERP · المالك والمشرف</p></div></div><div class="tabs"><button id="loginTab" class="active">تسجيل الدخول</button><button id="signupTab">إنشاء حساب مشرف</button></div><form id="form"><div class="field hidden" id="nameWrap"><label>الاسم</label><input id="name"></div><div class="field"><label>البريد الإلكتروني</label><input id="email" type="email" required autocomplete="email"></div><div class="field"><label>كلمة المرور</label><input id="password" type="password" required minlength="6"></div><button class="primary" id="submit">دخول</button><div class="msg" id="msg"></div></form></div><script type="module">import{firebaseConfig}from'./firebase-config.js';import{initializeApp}from'https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js';import{getAuth,onAuthStateChanged,signInWithEmailAndPassword,createUserWithEmailAndPassword,updateProfile}from'https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js';const auth=getAuth(initializeApp(firebaseConfig));let mode='login';const $=s=>document.querySelector(s);function setMode(m){mode=m;$('#loginTab').classList.toggle('active',m==='login');$('#signupTab').classList.toggle('active',m==='signup');$('#nameWrap').classList.toggle('hidden',m!=='signup');$('#submit').textContent=m==='login'?'دخول':'إنشاء الحساب';}$('#loginTab').onclick=()=>setMode('login');$('#signupTab').onclick=()=>setMode('signup');$('#form').onsubmit=async e=>{e.preventDefault();$('#submit').disabled=true;$('#msg').textContent='جاري التحقق…';try{let c;if(mode==='login')c=await signInWithEmailAndPassword(auth,$('#email').value.trim(),$('#password').value);else{c=await createUserWithEmailAndPassword(auth,$('#email').value.trim(),$('#password').value);await updateProfile(c.user,{displayName:$('#name').value.trim()||'مشرف'});}location.replace('./dashboard.html?v=27.2.0');}catch(err){const map={'auth/invalid-credential':'البريد أو كلمة المرور غير صحيحة.','auth/email-already-in-use':'البريد مسجل مسبقًا.','auth/weak-password':'كلمة المرور ضعيفة.','auth/too-many-requests':'محاولات كثيرة، انتظر قليلًا.'};$('#msg').textContent=map[err.code]||err.message;}finally{$('#submit').disabled=false;}};onAuthStateChanged(auth,u=>{if(u)location.replace('./dashboard.html?v=27.2.0')});</script></body></html>
