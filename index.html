<style>
:root{--bg:#09090b;--panel:#121214;--panel2:#18181b;--line:#2a2928;--gold:#d6b760;--gold2:#9d7a31;--text:#f4efe5;--muted:#9e988f;--good:#77c48f;--bad:#e47b7b;--warn:#e2b45a}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 85% 0,rgba(214,183,96,.12),transparent 28%),var(--bg);color:var(--text);font-family:Tajawal,Arial,sans-serif;min-height:100vh}.hidden{display:none!important}button,input,select,textarea{font:inherit}.gate{min-height:100vh;display:grid;place-items:center;padding:22px}.login{width:min(440px,100%);background:linear-gradient(180deg,#19191c,#101012);border:1px solid rgba(214,183,96,.3);border-radius:24px;padding:27px;box-shadow:0 35px 90px #0008}.brand{display:flex;align-items:center;gap:14px;margin-bottom:23px}.diamond{width:56px;height:56px;border:1px solid var(--gold);border-radius:12px;transform:rotate(45deg);display:grid;place-items:center;color:var(--gold);font-weight:800}.diamond span{transform:rotate(-45deg)}h1,h2,h3{font-family:El Messiri,Tajawal,sans-serif}.brand h1{font-size:22px;margin:0}.brand p{margin:3px 0 0;color:var(--muted);font-size:12px}.tabs{display:grid;grid-template-columns:1fr 1fr;background:#0a0a0c;border:1px solid var(--line);padding:4px;border-radius:12px}.tabs button{padding:10px;border:0;border-radius:9px;background:none;color:var(--muted)}.tabs button.active{background:#29251b;color:#f1d47d}.field{margin:13px 0}.field label{display:block;color:var(--muted);font-size:11px;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;background:#0a0a0c;color:#fff;border:1px solid #343438;border-radius:11px;padding:12px;outline:none}.field input:focus,.field textarea:focus{border-color:var(--gold)}.primary{border:1px solid var(--gold);background:linear-gradient(180deg,var(--gold),var(--gold2));color:#111;padding:12px 16px;border-radius:11px;font-weight:800;cursor:pointer}.secondary{border:1px solid #3b3935;background:#171719;color:#ddd;padding:9px 12px;border-radius:10px;cursor:pointer}.danger{border-color:#663b3b;color:#ffb0b0}.msg{min-height:24px;font-size:12px;color:var(--warn);margin-top:10px}.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}.side{border-left:1px solid var(--line);background:#0e0e10;padding:18px;position:sticky;top:0;height:100vh}.side .brand{margin-bottom:30px}.nav{display:grid;gap:7px}.nav button{border:1px solid transparent;background:none;color:#aaa49b;text-align:right;padding:11px;border-radius:10px;cursor:pointer}.nav button.active,.nav button:hover{border-color:#3a3427;background:#1d1a14;color:#ecd27e}.sidefoot{position:absolute;bottom:17px;right:18px;left:18px;color:#777;font-size:10px}.main{padding:24px;min-width:0}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:20px}.top h2{margin:0}.who{display:flex;align-items:center;gap:10px}.pill{border:1px solid #3b382f;background:#171612;padding:6px 10px;border-radius:99px;font-size:10px;color:#d8c88d}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{background:linear-gradient(180deg,#171719,#111113);border:1px solid var(--line);border-radius:16px;padding:16px}.metric span{font-size:10px;color:var(--muted)}.metric b{font-family:El Messiri;font-size:25px;display:block;margin-top:7px}.gold{color:#efd27b}.section{margin-top:17px}.section h3{margin:0 0 10px}.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:14px}table{width:100%;border-collapse:collapse;min-width:760px;background:#111113}th,td{padding:11px;border-bottom:1px solid #242427;text-align:right;font-size:11px}th{color:#b7afa2;background:#171719}.status{display:inline-flex;border:1px solid #423d32;padding:4px 8px;border-radius:99px;font-size:9px}.status.pending{color:var(--warn)}.status.approved{color:var(--good)}.status.rejected{color:var(--bad)}.actions{display:flex;gap:6px}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.wide{grid-column:1/-1}.notice{border:1px solid rgba(214,183,96,.25);background:rgba(214,183,96,.06);padding:13px;border-radius:12px;color:#c7b783;font-size:11px;margin-bottom:14px}.empty{padding:35px;text-align:center;color:#777}.mobilebar{display:none}
@media(max-width:900px){.app{grid-template-columns:1fr}.side{display:none}.main{padding:15px;padding-bottom:85px}.grid4{grid-template-columns:1fr 1fr}.formgrid{grid-template-columns:1fr}.wide{grid-column:auto}.mobilebar{display:grid;grid-template-columns:repeat(4,1fr);position:fixed;bottom:0;right:0;left:0;background:#101012eF;backdrop-filter:blur(14px);border-top:1px solid var(--line);z-index:30}.mobilebar button{border:0;background:none;color:#999;padding:13px 4px;font-size:10px}.mobilebar button.active{color:#efd27b}.top{align-items:flex-start}.who{flex-direction:column;align-items:flex-end}}
