<style>
:root{--bg:#09090b;--panel:#121214;--panel2:#18181b;--line:#2a2928;--gold:#d6b760;--gold2:#9d7a31;--text:#f4efe5;--muted:#9e988f;--good:#77c48f;--bad:#e47b7b;--warn:#e2b45a}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 85% 0,rgba(214,183,96,.12),transparent 28%),var(--bg);color:var(--text);font-family:Tajawal,Arial,sans-serif;min-height:100vh}.hidden{display:none!important}button,input,select,textarea{font:inherit}.gate{min-height:100vh;display:grid;place-items:center;padding:22px}.login{width:min(440px,100%);background:linear-gradient(180deg,#19191c,#101012);border:1px solid rgba(214,183,96,.3);border-radius:24px;padding:27px;box-shadow:0 35px 90px #0008}.brand{display:flex;align-items:center;gap:14px;margin-bottom:23px}.diamond{width:56px;height:56px;border:1px solid var(--gold);border-radius:12px;transform:rotate(45deg);display:grid;place-items:center;color:var(--gold);font-weight:800}.diamond span{transform:rotate(-45deg)}h1,h2,h3{font-family:El Messiri,Tajawal,sans-serif}.brand h1{font-size:22px;margin:0}.brand p{margin:3px 0 0;color:var(--muted);font-size:12px}.tabs{display:grid;grid-template-columns:1fr 1fr;background:#0a0a0c;border:1px solid var(--line);padding:4px;border-radius:12px}.tabs button{padding:10px;border:0;border-radius:9px;background:none;color:var(--muted)}.tabs button.active{background:#29251b;color:#f1d47d}.field{margin:13px 0}.field label{display:block;color:var(--muted);font-size:11px;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;background:#0a0a0c;color:#fff;border:1px solid #343438;border-radius:11px;padding:12px;outline:none}.field input:focus,.field textarea:focus{border-color:var(--gold)}.primary{border:1px solid var(--gold);background:linear-gradient(180deg,var(--gold),var(--gold2));color:#111;padding:12px 16px;border-radius:11px;font-weight:800;cursor:pointer}.secondary{border:1px solid #3b3935;background:#171719;color:#ddd;padding:9px 12px;border-radius:10px;cursor:pointer}.dang 06);padding:13px;border-radius:12px;color:#c7b783;font-size:11px;margin-bottom:14px}.empty{padding:35px;text-align:center;color:#777}.mobilebar{display:none}.mobile-cards{display:none}.order-mini{border:0;background:transparent;color:#8f8a82;font-size:11px;padding:3px 5px;cursor:pointer;direction:ltr}.source{display:inline-flex;padding:4px 8px;border-radius:99px;font-size:9px;border:1px solid #3b3935}.source.historical{color:#c5b16d;background:#211d13}.source.cloud{color:#83c998;background:#122018}.sale-card{background:linear-gradient(180deg,#171719,#111113);border:1px solid var(--line);border-radius:17px;padding:15px}.sale-top,.sale-bottom,.sale-meta{display:flex;align-items:center;justify-content:space-between;gap:10px}.sale-label{display:block;color:var(--muted);font-size:10px}.sale-diamonds{display:block;color:#efd27b;font-family:El Messiri;font-size:27px;direction:ltr;text-align:right}.sale-amount{font-family:El Messiri;font-size:22px;margin:12px 0;direction:ltr;text-align:right}.sale-meta{color:var(--muted);font-size:11px;border-top:1px solid #242427;border-bottom:1px solid #242427;padding:10px 0;margin-bottom:11px}.sale-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.metric b,td,input[type=number]{font-variant-numeric:tabular-nums;direction:ltr}

.toolbar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin:0 0 14px}.toolbar input,.toolbar select{background:#0d0d0f;color:var(--text);border:1px solid var(--line);border-radius:11px;padding:10px 12px;min-height:42px}.toolbar .search{flex:1;min-width:190px}.kpi-main{position:relative;overflow:hidden}.kpi-main:after{content:"";position:absolute;width:110px;height:110px;border-radius:50%;background:rgba(214,183,96,.08);left:-35px;bottom:-55px}.metric small{display:block;color:#777;font-size:9px;margin-top:6px}.trend{font-size:10px!important;color:var(--good)!important}.trend.down{color:var(--bad)!important}.stockbar{height:6px;border-radius:99px;background:#252525;margin-top:11px;overflow:hidden}.stockbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:99px}.split{display:grid;grid-template-columns:1.35fr .65fr;gap:14px}.chart-card{min-height:260px}.bars{display:flex;align-items:flex-end;gap:8px;height:170px;padding-top:18px}.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0}.bar-col i{width:100%;max-width:34px;min-height:3px;border-radius:7px 7px 2px 2px;background:linear-gradient(180deg,var(--gold),#6e5623)}.bar-col span{font-size:8px;color:var(--muted);direction:ltr}.summary-list{display:grid;gap:9px}.summary-item{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid #242427}.summary-item:last-child{border-bottom:0}.summary-item span{font-size:10px;color:var(--muted)}.summary-item b{font-size:13px;direction:ltr}.purchase-cards,.expense-cards,.user-cards{display:none}.record-card{background:linear-gradient(180deg,#171719,#111113);border:1px solid var(--line);border-radius:16px;padding:14px}.record-head{display:flex;justify-content:space-between;align-items:center;gap:10px}.record-value{font-family:El Messiri;font-size:22px;color:#efd27b;direction:ltr;margin:10px 0}.record-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;color:var(--muted);font-size:10px}.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}.quick-actions button{background:#151517;border:1px solid var(--line);color:var(--text);border-radius:14px;padding:14px 8px;cursor:pointer}.quick-actions b{display:block;color:var(--gold);font-size:18px;margin-bottom:4px}.modal{position:fixed;inset:0;background:#000b;display:grid;place-items:center;padding:18px;z-index:80}.modal-box{width:min(480px,100%);max-height:85vh;overflow:auto;background:#171719;border:1px solid #494230;border-radius:20px;padding:20px}.modal-head{display:flex;justify-content:space-between;align-items:center}.modal-close{background:none;border:0;color:#aaa;font-size:25px}.details-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.details-grid div{background:#0e0e10;border:1px solid #29292c;border-radius:11px;padding:11px}.details-grid span{display:block;color:var(--muted);font-size:9px}.details-grid b{display:block;margin-top:5px;font-size:12px;direction:ltr}.chiprow{display:flex;gap:7px;flex-wrap:wrap}.chip{border:1px solid #3a3833;background:#141416;color:#bdb6ab;padding:7px 10px;border-radius:99px;font-size:10px;cursor:pointer}.chip.active{border-color:var(--gold2);color:#efd27b;background:#211d13}.section-title{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}.section-title h3{margin:0}.muted{color:var(--muted);font-size:10px}
@media(max-width:900px){.app{grid-template-columns:1fr}.side{display:none}.main{padding:15px;padding-bottom:85px}.grid4{grid-template-columns:1fr 1fr}.formgrid{grid-template-columns:1fr}.wide{grid-column:auto}.desktop-table{display:none}.mobile-cards{display:grid;gap:11px}.mobilebar{display:flex;overflow-x:auto;position:fixed;bottom:0;right:0;left:0;background:#101012eF;backdrop-filter:blur(14px);border-top:1px solid var(--line);z-index:30}.mobilebar button{border:0;background:none;color:#999;padding:13px 12px;font-size:10px;flex:0 0 auto;min-width:78px}.mobilebar button.active{color:#efd27b}.top{align-items:flex-start}.who{flex-direction:column;align-items:flex-end}.metric b{font-size:20px}.section h3{font-size:16px}.split{grid-template-columns:1fr}.quick-actions{grid-template-columns:1fr 1fr}.purchase-table,.expense-table,.user-table{display:none}.purchase-cards,.expense-cards,.user-cards{display:grid;gap:10px}.toolbar{position:sticky;top:0;z-index:15;background:#09090be8;padding:8px 0;backdrop-filter:blur(12px)}.details-grid{grid-template-columns:1fr 1fr}.top h2{font-size:27px}.who #logout{padding:7px 10px;font-size:11px}}
</style></head><body>
<div id="gate" class="gate"><div class="login"><div class="brand"><div class="diamond"><span>DM</span></div><div><h1>DOT ALMASIAH</h1><p>Cloud ERP · المبيعات والمخزون والعمليات</p></div></div><div class="tabs"><button id="tabLogin" class="active">تسجيل الدخول</button><button id="tabSignup">إنشاء حساب مشرف</button></div><form id="authForm"><div class="field signupOnly hidden"><label>الاسم</label><input id="name" autocomplete="name"></div><div class="field"><label>البريد الإلكتروني</label><input id="email" type="email" required autocomplete="email"></div><div class="field"><label>كلمة المرور</label><input id="password" type="password" minlength="6" required autocomplete="current-password"></div><button id="authBtn" type="submit" class="primary" style="width:100%">دخول</button></form><div id="authMsg" class="msg"></div></div></div>
<div id="app" class="app hidden"><aside class="side"><div class="brand"><div class="diamond"><span>DM</span></div><div><h1>DOT ALMASIAH</h1><p>Cloud ERP</p></div></div><nav class="nav"><button data-view="dashboard" class="active">لوحة التحكم</button><button data-view="newSale">تسجيل مبيعة</button><button data-view="sales">سجل المبيعات</button><button data-view="purchases" class="ownerOnly">المشتريات والمخزون</button><button data-view="expenses" class="ownerOnly">المصاريف</button><button data-view="users" class="ownerOnly">المستخدمون والصلاحيات</button><button data-view="analytics" class="ownerOnly">التحليلات المالية</button><button data-view="legacy" class="ownerOnly">المذيعون والتقارير</button></nav><div class="sidefoot">Firebase · dot-diamond<br>نسخة ERP Cloud v24 Operations</div></aside><main class="main"><header class="top"><div><h2 id="viewTitle">لوحة التحكم</h2><div id="viewSub" style="color:var(--muted);font-size:11px">متابعة العمليات أولًا بأول</div></div><div class="who"><span id="rolePill" class="pill">—</span><button id="logout" class="secondary">خروج</button></div></header><div id="content"></div></main><nav class="mobilebar"><button data-view="dashboard" class="active">الرئيسية</button><button data-view="newSale">بيع جديد</button><button data-view="sales">المبيعات</button><button data-view="purchases" class="ownerOnly">المشتريات</button><button data-view="expenses" class="ownerOnly">المصاريف</button><button data-view="users" class="ownerOnly">المستخدمون</button></nav></div>
<script>
window.__dotAppStarted=false;

</script><script type="module" src="./app.js?v=24.0.1"></script><script>
